body:
  text: 卷之七諸家秘要名方凡五家一巢氏論針眼候凡眼內眥頭忽結成疱三五日間便生膿汁世呼為偷針此由熱氣客在眥間熱搏津液所成但其勢輕者故止小小結聚汁潰熱歇乃瘥二三因方十三方千金神麯丸主明目百歲可讀細書常服大益眼目神麯四兩磁石二兩火煅醋淬七次光明硃砂一兩上為末煉蜜為丸如梧桐子大米湯服五丸食前日三服羌活散治風毒上攻眼目昏澀翳膜生瘡及偏正頭疼目小黑花累累者羌活川芎天麻青皮藁本旋覆花天南星炮各一兩上為末每服二錢水一盞姜三片薄荷七葉煎至七分食後服一法入牽牛末二兩以生薑汁煮糊丸如桐子大酒任下二三十丸白蒺藜散治腎臟風毒上攻眼目赤腫熱淚昏澀胬肉攀睛白蒺藜炒去刺甘草生殭蠶去絲嘴直者炒防風各一兩天南星一兩半黑豆二合青鹽半兩水煮透取出焙稱不用鹽豆甘菊花三兩生上為末每服二錢煎甘草湯調下食後服忌炙煿物洗肝散治肝熱赤脈貫睛澀痛衝風淚下兼治熱血攻心白蒺藜一兩半防風羌活各半兩馬牙硝二兩甘草一分上為末每服二錢食後白湯調下椒紅丸明目暖水臟補虛久服駐顏縮小便川椒取紅四兩巴戟去心金鈴子銼炒附子炮去皮臍茴香炒各一兩上為末別用山藥三兩為末酒煮糊為丸如桐子大空心鹽湯下三五十丸煮肝散治眼赤有耳癢證用四生散入羊子肝煮甚妙白附子白蒺藜黃耆羌活各等分上為末每服四錢匕鹽酒入羊子肝煮空心溫服子肝即羊肝上有小片者是驅風散治風毒上攻眼腫癢澀痛不可忍或上下瞼眥赤爛或翳肉侵睛五倍子一兩去塵土蔓荊子一兩半洗上銼散每服三錢水二盞銅石器內煎取一盞澄清熱洗留滓二服再煎立勝散治風毒攻眼及時眼隱澀羞明腫痛黃連黃柏秦皮去粗皮甘草各等分上銼散每服四錢水一盞棗一個燈心七莖煎數沸去滓以新羊毛筆蘸刷眼候溫即以手沃之一法不用黃柏甘草有防風黃芩神仙照水膏治障翳蠟一兩黃丹一兩水飛蛇蛻一分水銀一錢初生烏雞殼一個上為柳木棰研細滴蠟為餅臨臥用之候天明將水點眼藥墜水中翳膜盡去柏竹瀝膏治一切赤眼障翳慈竹截作段去兩頭黃柏刮去粗皮刮細者蒲填竹內上用新磚對立置竹磚上兩頭各安淨碗以干竹火燒令瀝出盡收之以銅箸點眼通和膏治眼赤澀翳膜遮障時多熱淚輕粉一字乳香皂莢子大杏仁二十個去皮尖嚼細上旋入口中都嚼候津液滿口吐出瓷器中置火上令四邊沸以綿濾別盞中入生腦子皂子大研勻再濾過以銅箸點之通神膏治眼生翳膜赤脈胬肉澀癢痛有淚沙蜜四兩青鹽麝香各一字乳香硇砂滴過枯礬各半字當歸五分黃連一錢上件乳缽內研碎同蜜入竹筒內密封定煮半日厚綿濾過點眼蛤粉丸治雀目不拘久近但日落便不見物黃蠟上色蛤粉細研各等分上鎔蠟搜粉為丸如棗大每用豬肝一片二兩許批開裹藥一丸麻綿纏定瓷器內用水一碗煮熟取出乘熱熏眼至溫吃肝以瘥為度三本事方六方鎮肝明目羊肝丸甘菊花羌活柏子仁白朮細辛官桂五味子各半兩黃連三分羯羊肝一具新瓦盆中炙乾更焙之若肝大止用一半上為末煉蜜為丸如桐子大空心食前溫水下三四十丸又方菟絲子車前子麥門冬決明子白茯苓五味子枸杞子茺蔚子苦葶藶地膚子去殼蕤仁澤瀉防風黃芩杏仁大者炒華陰細辛桂心青葙子各一兩熟地黃一兩半白羯羊肝只用子肝一片薄切新瓦上炙乾上為細末煉蜜為丸如桐子大每服三四十丸溫水下日三服不拘時候張臺卿嘗苦目暗京師醫者令灸肝腧遂轉不見物因得此方服之遂明有一男子內障醫治無效因以余劑遺之一夕於燈下語其家人曰適偶有所見如隔門縫見火者及旦視之眼中翳膜且裂如線張云此藥最靈勿妄與人忽之則無驗子隘之且欲廣其傳也又方羌活川芎旋覆花防風各半兩甘草楮葉甘菊花蒼朮米泔浸去皮枳實蟬蛻木賊桑葉八月授陰乾各一兩上木臼中搗為末茶清調下二錢早晚食後臨臥各一服亦治赤眼忌濕面及酒楮葉須真無實者余不堪用不爾諸藥悉無效合時不得烙及犯鐵器予觀此方取楮葉必無實者蓋陰陽二物相匹配爾有實者陽也無實取葉者陰也所以不得其真諸藥悉無效菊花散治腎肝風毒熱氣上衝眼痛甘菊花牛蒡子炒熟各八兩防風三兩白蒺藜去刺一兩甘草一兩上細末每服二錢熟水調下食後臨臥服素問云久視傷血血主肝故勤書則傷肝主目昏肝傷則自生風熱氣上湊於目其昏亦甚不可專服補藥須服益血鎮肝明目藥地黃丸黃連決明子各一兩沒藥甘菊花防風羌活桂心光明硃砂各半兩干熟地黃一兩半上為細末煉蜜為丸如桐子大每服三十丸熟水下食後日三服讀書之苦傷肝損目誠然晉範寧嘗苦目痛就張湛求方湛戲之曰古方宋陽子少得其術以授魯東門伯次授左邱明遂世世相傳以及漢杜子夏晉左太衝凡此諸賢並有目疾俱得此方云用損讀書一減思慮二專內視三簡外觀四旦起晚五夜早眠六凡此六物熬以神火下以氣蓰蘊於胸中七日然後納諸方寸修之一時近能數其目睫遠視尺棰之餘長服不已動見牆壁之外非但明目乃亦延年審如是而行之非可謂之嘲戲亦奇方也治頭風冷淚方龐安常甘菊花決明子各三分白朮羌活川芎細辛白芷荊芥穗各半兩上為細末溫湯調下食後日三服又方龐安常川芎甘菊細辛白朮白芷各一分上為細末蠟丸如黍米大夜臥納一丸目中一時辰換一丸荀牧仲頃年嘗謂予曰有一人視一物為兩醫者作肝氣有餘故見一為二令服補肝藥皆不效此何疾也予曰孫真人云目之繫上屬於腦後出於項中邪中於頸因逢身之虛其入深則隨目系入於腦入於腦則轉轉則目系急急則目眩以轉邪中其睛所中者不相比則睛散睛散則歧故見兩物也令服驅風入腦藥則愈四百一選方五方芎菊散治暴赤眼薄荷二兩菊花甘草川芎各一兩防風七錢白芷半兩上為細末食後茶少許沸湯點服如傷風用酒調服其效尤速冀州郭家明上膏治遠年近日不睹光明內外障眼攀睛胬肉連瞼赤爛隱澀難開怕日羞明推眵有淚視物茫茫時見黑花或瞼生風粟或翳膜侵睛時發癢痛並皆治療此藥神妙無比不可盡述兼治口瘡塗之立愈冀宰曾合服甚奇白沙蜜一斤黃丹四錢硇砂另研乳香另研青鹽輕粉硼砂以上俱另研各二錢麝香另研五分金星石銀星石井泉石雲母石各一兩腦子另研二錢黃連去須烏魚骨各五錢上件藥於淨室中不得令婦人雞犬見用銀石器內慢火先炒黃丹令紫色次下蜜候熬得滴水不散其色皆紫次入臘月雪水三升再熬二十餘沸將其餘藥研入末一處同熬用箸滴在指甲上成珠不散為度以厚紙三張鋪在筲箕內傾藥在紙上濾過再用瓶子盛放在新水內浸三晝夜去火毒其水日一易之看病眼輕重臨晚用箸頭蘸藥點大眥頭以眼澀為度若治內障眼目用面水和成條而捏作圈子臨睡置眼上傾藥在內如此用之一月見效五蛻散治內障得效方龍蛻即蛇皮蟬蛻鳳凰蛻鳥花雞卵殼佛蛻即蠶紙人蛻男子退發上等分不以多少一處同燒作灰研為細末每服一錢用熟豬肝吃不拘時候日進三服五生散治目赤去頭風退翳錢文子傳天雄附子尖各半兩防風一兩天南星一兩川續斷一兩並生用上為飲子每服二錢水一盞半生薑七片酒少許煎至六分食後溫服因頭風而病目者服之必效地黃丸唐丞相李恭公扈從在蜀中日患眼或澀或生翳膜或即疼痛或見黑花如豆大累累數十不斷或見如飛蟲翅羽百方治之不效僧智深云相公此病緣受風毒夫五臟實則瀉其子虛則補其母母能令子實子能令母虛腎是肝之母令腎受風毒故令肝虛肝虛則目中恍惚五臟亦然腳氣消渴諸風等皆由腎虛也地黃丸悉主之生乾地黃一斤熟乾地黃一斤石斛去苗四兩防風去蘆四兩枳殼麩炒四兩牛膝酒浸杏仁去皮尖麩炒黃為末入瓦器內去油上為細末不犯鐵器煉蜜為丸如桐子大空心以豆淋酒下五十丸豆淋酒法黑豆半升淨揀簸炒令煙出以酒三升浸之不用黑豆用此酒煮獨活即是紫湯也五和劑方十四方錦鳩丸治肝經不足風邪內乘上攻於眼眼暗淚出怕日羞明隱澀癢痛瞻視茫茫多見黑花或生翳膜並皆治之斑鳩一隻去皮毛腸嘴爪用文武火連骨炙乾用牡蠣去土取粉用防風去蘆羯羊肝一具薄批炙乾令焦黃連去須蔓荊子二升淘洗絹袋盛飯甑蒸少時曬桂去皮杜蒺藜去尖角炒各二兩甘菊花揀淨各五兩蕤仁去皮羌活去蘆瞿麥草決明各三兩白茯苓去皮四兩細辛二兩上十五味為末煉蜜和杵五百杵丸如桐子大每服十五丸至二十丸溫水或酒下空心日午臨臥三服如久患內外障眼服諸藥不效者漸加至五十丸必效暴赤眼疼痛食後用荊芥湯下二十丸駐景丸治肝腎俱虛眼常暗昏多見黑花或生障翳視物不明迎風有淚久服補肝腎增眼力車前子三兩干熟地黃三兩菟絲子五兩酒浸別研為末上為末煉蜜為丸如桐子大每服三十丸溫酒送下空心晚食前日二服密蒙花散治風氣攻注兩眼昏暗眵淚羞明瞼生風粟隱澀難開或癢或痛漸生翳膜視物不明久患偏頭疼牽引兩眼漸覺細小昏澀隱疼並暴赤腫疼皆治之密蒙花揀淨羌活去蘆菊花去土石決明杜蒺藜炒去尖木賊各等分銼上為細末每服一錢茶清調下食後日二服羚羊角散治大小兒一切風毒氣上衝眼目暴發赤腫或生瘡疼痛隱澀難開羞明怕日羚羊角半錢川升麻黃芩車前子甘草各二十兩微炒決明子二十兩草龍膽去蘆梔子仁各五兩上為細末每服一錢食後溫熟水調下日三服小兒服半錢秦皮散治大人小兒風毒赤眼腫疼癢澀眵淚昏暗羞明秦皮銼桂府滑石杵碎黃連各等分去須上為細末每服半錢沸湯點去滓溫熱頻洗鎮肝丸治肝經不足內受風熱上攻眼目昏暗癢痛隱澀難開眵多有淚怕日羞明時發腫赤或生障翳並皆服之決明子地膚子白茯苓去皮遠志去心茺蔚子防風去蘆頭及叉殳蔓荊子去白皮人參各一兩去蘆青葙子車前子地骨皮去土柏子仁炒甘草銼甘菊花柴胡去蘆玄參山藥各半兩細辛一分去苗上為末蜜水煮糊為丸如桐子大每服二十丸米飲下食後日三服菊睛丸治肝腎不足眼目昏暗瞻視不明茫茫漠漠常見黑花多有冷淚久服補不足強目力巴戟一兩去心枸杞子三兩甘菊花四兩蓯蓉一兩酒浸去皮炒切上為細末煉蜜為丸如桐子大每服二十丸至五十丸溫酒或鹽湯下空心食前服菩薩散治風氣攻注兩眼昏暗眵淚羞明瞼眥腫癢動時亦痛耳鳴頭眩白蒺藜炒防風銼炒甘草一兩荊芥穗一兩半蒼朮各二兩米泔浸一宿銼炒上為末不拘時候入鹽少許沸湯或酒調下一大錢神效撥雲散治風毒上攻眼目昏暗翳膜遮障怕日羞明時多熱淚隱澀難開眶骨赤痛瞼眥紅爛瘀肉侵睛但是風毒眼疾並皆治之羌活防風甘草炒柴胡各等分上為細末每服二錢水一盞煎至七分食後臨睡時服薄荷湯茶調下菊花末湯下亦得忌炙煿鮓面等流氣飲治肝經不足內受風熱上攻眼目昏暗視物不見常見黑花當風多淚怕日羞明推眵赤腫隱澀難開或生翳障倒睫拳毛眼眩赤爛及婦人血風眼及時行暴赤眼胞紫黑應有眼病並皆治之荊芥去梗山梔去尖皮牛蒡子炒蔓荊子去白白蒺藜去尖細辛去葉防風去蘆玄參去蘆木賊去尖節川芎淨大黃炮菊花甘草炙黃芩各一兩製蒼朮二兩草決明一兩半上為細末每服二錢臨臥冷酒調下如嬰孩有患只令乳母服之睛明散治外障退翳膜療風毒上攻眼疼赤腫或瞼眥癢爛時多熱淚昏澀黃連去須當歸去蘆洗赤芍藥滑石細研各五兩上件銼研為細末研滑石拌勻每用半錢沸湯點澄清去滓熱洗忌一切醃藏魚酢酒面等毒物春雪膏治肝經不足內受風熱上攻頭目昏暗癢痛隱澀難開推眵赤腫怕日羞明不能遠視迎風有淚多見黑花腦子二錢半研蕤仁二兩去皮二兩細研上用生蜜六錢重將腦子蕤仁同和每用銅箸或金銀釵股大小眥時復少許點之又治連眶赤爛以紙塗膏貼之菊花散理肝氣風毒眼目赤腫昏暗羞明隱澀難開攀睛胬肉或癢或痛漸生翳膜及治暴赤腫疼並皆治之蟬蛻去頭翅足土木賊去根節白蒺藜去尖炒羌活各三兩去蘆不見火菊花六兩去梗上為細末每服二錢食後臨臥茶清調下常服明利頭目洗肝去風忌發風醃藏炙煿等物洗肝散治風毒上攻暴作赤目腫痛難開隱澀眵淚昏暗羞明或生翳膜並皆治之大黃煨山梔去皮當歸酒洗去蘆防風去蘆薄荷去梗羌活去蘆甘草炙川芎各等分上為細末每服二錢冷水或熟水調下食後日三服見效
