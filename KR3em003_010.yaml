body:
  text: 卷之十三木部凡二十九種桂味甘辛大熱有小毒主利肝肺氣頭痛日華子治一切風明目松脂味苦甘溫無毒除胃中伏熱枸杞味苦寒根名地骨皮大寒子微寒無毒春夏採葉秋採莖實冬採根藥性論葉和羊肉作羹益人甚除風明目若渴可煮作飲代茶飲之主患眼風障赤膜昏痛取葉搗汁注眼中妙千金方治肝虛或當風眼淚枸杞最肥者二升搗破納絹袋中置罐中以酒一斗浸干密封勿泄氣三七日每旦飲之任性勿醉肘後方療目熱生膚赤白眼搗枸杞汁點眼立效外臺秘要療眼暴赤天行腫癢痛地骨皮三斤水三斗煮取三升絞去渣更內鹽一兩炒取二升敷目或加乾薑二兩柏實味甘平無毒主益氣除風久服耳目聰明茯苓味甘平無毒主開胸腑調臟氣雷公云凡採得搗令細於水盆中絞令濁浮者去之是茯苓而若誤服之令人眼中瞕子並黑睛點小兼目盲記之琥珀味甘平無毒日華子明目摩翳黃柏味苦寒無毒療目熱赤腫日華子洗肝明目止淚楮實味甘寒無毒主明目葉亦入方用外臺秘要點眼翳取楮白皮暴乾合作一繩子如釵股火燒作灰待冷細研如面每點於翳上日三五度漸消蔓荊味苦辛微寒平溫無毒主明目頭風痛目淚出日華子治赤眼蕤核味甘溫微寒無毒主明目赤腫痛淚出目腫眥爛圖經劉禹錫傳信方所注法最奇云眼風淚癢或生翳或赤眥一切皆主之宣州黃連搗篩末蕤仁去皮研為膏緣此性稍濕末不得故耳與黃連等分合和取無蟲干棗二枚割頭少許留之去卻核以二物滿填於中卻取所割下棗頭依前合定以小綿裹之惟薄綿為佳以大茶碗量水半碗於銀器中文武火煎取一雞子以來以綿濾待冷點眼萬萬不失前後試驗數十人皆應今醫家亦多用得效故附之藿香微溫療風乳香微溫日華子味辛熱微毒去惡風桑葉主除寒熱日華子暖無毒除風痛春葉未開時可作煎服治一切風經驗方治青盲此一法當依而用之視物如膺鶻者有此效正月八二月八三月六四月四五月五六月六七月七八月二十九月十二十七十月二十二月晦每遇上件神日用桑柴灰合以煎湯沃之於瓷器中澄令極清以藥稍熱洗之如覺冷即重湯煮令得所不住手洗遇上件日不得不洗緣此神日本法也梔子味苦寒大寒無毒療目熱赤痛胃中熱氣麒麟竭味甘鹹平有毒小破積血日華子此藥性急亦不可多使龍腦味辛苦微寒一云溫平無毒主明目去目赤膚海藥謹按陶弘景雲主內外障眼又有蒼龍腦用點眼則有傷切宜擇用枳殼味苦酸微寒無毒止風痛日華子除風明目及肺氣食醫心鏡用枳殼一兩杵末如茶法煎用明目秦皮味苦微寒大寒無毒去風除熱目中青翳白膜可作湯洗目藥性主明目去肝中久熱兩目赤腫疼痛風不止淚秦皮一升水煎澄清冷洗赤眼極效外臺秘要治赤眼及睛上瘡秦皮一兩清水一升於白碗內浸春夏一食時以上看碧色出即以箸頭纏綿仰臥點所患眼仍洗從大眥中滿眼著微痛不畏良久三五飯間即側臥瀝卻熱汁每日十度以上著不過兩日瘥又治眼因赤瘥後翳暈秦皮一兩切水一升五合煮取七合澄清漬目中沒藥味苦平無毒主目中翳暈痛膚赤五倍子味苦酸平無毒療肺臟風博濟方治風毒上攻眼目腫癢澀痛不可忍者或上下瞼眥赤爛浮翳瘀肉侵睛神效驅風散五倍子一兩蔓荊子一兩半同杵末每服二錢水二盞銅石器內煎及一盞澄滓熱淋洗留滓二服又依前淋洗大能明目去澀癢密蒙花味甘平微寒無毒主青盲膚翳赤澀眵多淚消目中赤脈及疳氣攻眼訶梨勒味苦溫無毒圖經取其核入白蜜研注目中治風赤澀痛神效石南味辛苦中有毒能逐諸風鉤藤微寒無毒突厥白味苦槐木千金方療肝赤眼取槐木枝如馬鞭大長二尺作一段齊頭麻油一匙置銅缽中且使童子一人以其木研之至瞑令仰臥以塗向眼眥日三度瘥又方明目黑髮取槐子於牛膽中漬陰乾百日食後吞槐子一枚十日身輕三十日白髮黑百日內通神食醫心鏡明目方嫩槐葉一斤蒸如造炙肝取葉研末如茶法煎呷之牡荊木肘後方療目卒痛燒荊木出黃汁敷之雞舌香抱朴子用此香入黃連乳汁煎治目中病苦竹孫真人食忌治目中赤眥痛如刺不得開肝實熱所致或生障翳苦竹瀝五合黃連二分綿裹入竹瀝內浸一宿以點目中數度令熱淚出凡葉竹皆可煎湯飲之蓋竹葉能生膽上膏四人部凡二種乳汁味甘平無毒唐別錄首生男乳療目赤腫痛多淚又取和雀屎去赤胬肉肘後方療目熱生膚赤白膜取屎細直者以人乳和敷自消爛盡陳藏器雊𨿜眼睛和乳汁研滴目瞳子能見云外物又主目病以象睛和乳汁滴目中懷孕婦人爪甲取研細末置目中去障翳五獸部凡十四種麝香味辛溫無毒療風毒去目中膚翳雷公凡使麝香並用子日開之不用苦細研篩用孕婦不可服牛黃味苦平有小毒孕婦不可服熊脂味甘微寒溫無毒日華子治風療頭旋酥酸微寒日華子益心肺陳藏器堪用諸膏摩風腫牛膽味苦大寒益目睛藥性論臘月牝牛膽盛黑豆一百粒後百日開取食後夜間吞三七粒鎮肝明目黑豆盛汁不計多少牛肝主明目青羊膽主明目藥性論青羊肝服之明目膽點眼主赤障白膜風淚食療治肝風虛熱目赤暗痛熱病後失明者以青羊膽或子肝薄切水浸敷之極效生子肝吞之尤妙主目失明取羖肝一斤去脂膜薄切以未著水新瓦盆一口揩令淨鋪肝於盆中置於炭火上爆令脂汁盡候極干取決明子半升蓼子一合炒令香為末和肝搗之為末以白蜜漿下方寸匕食後服之日三加至三匕止不過三劑目極明一年服之妙夜見文字並諸物其羖羊即骨歷羊是也當患眼痛澀不能視物及看日光並燈火光不得者取熟羊頭眼睛中白珠子二枚於細石上和棗汁研之取如小麻子大安眼睛上仰臥日二夜二不過三四度瘥千金方治目赤及翳羊眼睛暴乾為末敷兩目又敷目䀮䀮青羊肝內銅器內煮以麵餅覆面上上鑽兩孔如人眼止以目向上熏之肘後方治目暗熱病後失明以羊膽敷之旦暮時各一敷之梅師方眼暗黃昏不見物者以青羊肝切淡醋食之煮亦佳羖羊角主青盲明目癢氣風頭痛羚羊角味鹹苦寒微寒無毒主明目犀角味苦酸鹹寒無毒療頭痛日華子鎮肝明目虎睛日華子鎮心兔肝主目暗孟詵肝主明目和決明子作丸服之又主服丹石人上衝眼暗不見物可生食之一如服羊子肝法日華子肝明目治頭旋眼痛豬肝方家多用之外臺秘要療目盲豬膽一枚微火上煎之可丸如黍米大內眼中食頃良又翳如重者取豬膽白皮曝乾合作小繩子如粗釵股大火燒作灰待冷便以灰點翳上不過三五度犬膽聖惠方治眼癢急赤澀用犬膽汁注目中食療上伏日採犬膽以酒調服明目去眼中濃水馬齒劉涓子主目有白翳息肉取齒一大握洗和朴硝少許杵以絹裹安眼上數易之六禽部凡二種白鵝膏斑鳩味甘平無毒主明目七蟲魚部凡十七種石蜜味甘平微溫無毒明目葛氏方目生珠管以蜜塗目中仰臥半日乃可洗去生蜜佳蜜蠟味甘微溫無毒集驗方治雀目如神黃蠟不以多少器內溶成汁取出入蛤粉相合得所成球每用以刀子切下二錢以豬肝二兩批開摻藥在內麻繩扎定水一碗同入銚子內煮熟取出乘熱熏眼至溫冷並肝食之日二以平安為度牡蠣味鹹平微寒無毒陶隱君左顧者雄故名牡蠣珍珠味寒無毒粉點目中主膚翳障膜石決明味鹹平無毒主目障翳痛青盲日華子涼明目殼磨翳障亦名九孔螺也圖經殼大者如手小者如三兩指海人亦啖其肉亦取其殼漬水洗眼七孔者良十孔者不佳鯉魚膽味苦寒無毒主目熱赤痛青盲明目藥性論目赤痛翳痛食療膽主除目中赤及熱痛點之良蟬蛻味甘寒無毒御藥院治頭風目眩為末飲湯下白殭蠶味鹹辛平無毒日華子治一切風病青魚膽味甘平微寒無毒主目暗滴汁目中貝子味鹹平有毒主明目一名貝齒千金方點小兒黑花眼翳澀痛用貝齒一兩作燒灰研如粉入少龍腦點之妙又去目翳貝子十枚燒灰細篩取一大胡豆著翳上臥如炊一石米久乃滅息肉者加珍珠與貝齒等分蛇蛻味鹹甘平無毒主明目蠍味甘辛有毒療諸風口眼喎斜烏賊魚經驗方治疳眼取烏魚骨牡蠣等分為末糊丸如皂角子大每服用豬肝一具藥一丸清米泔內煮肝熟為度和肝食用煮肝泔水下三兩服蠐螬千金方治稻麥芒入眼取蠐螬以新布覆目上持蠐螬從布上摩之其芒著布上蜘蛛外臺秘要治疣目以蜘蛛網絲纏繞自落田中螺藥性論治肝熱目赤腫痛取田中螺大者七枚淨洗新汲水養去穢泥重換水一升浸洗仍旋取於乾淨器中著少鹽花於口上承取自然汁用點目逐個如此用了卻放卻之百一方治目痛累年或三四十年方取生海螺一枚螺口開以黃連末內螺口中令螺飲黃連汁綿注取汁著眥中白魚即衣魚是也外臺秘要治目翳白魚末著少許於翳上八果部凡一種杏仁廣利方治眼築損胬肉出杏仁七枚去皮細嚼吐於掌中及熱以綿裹箸頭將點胬肉上不過四五度瘥左慈秘訣杏不用多食令人目盲千金方治頭面風眼瞤鼻塞眼暗冷淚杏仁三升為末水煮四五沸洗頭令汁盡三度瘥九米穀部凡二種小麻油大寒無毒主風氣去頭浮風千金方治物落眼中以清水研好墨點青蘘味甘寒無毒主益氣補腦久服耳目聰明十菜部凡七種蕪菁味苦溫無毒子主明目唐本北人又名蔓菁子主目暗千金方常服明目洞視肝腸蕪菁子三升以苦酒三升煮令熟日乾篩末以井花水服方寸匕加至二三日三服瓜蒂味苦寒有毒日華子治腦寒熱癰眼昏馬齒莧主目盲白翳子明目仙經用之食醫心鏡主青盲白翳除邪氣利大小腸去寒熱馬齒莧實大升搗為末每一匙煮蔥豉粥和攪食之煮粥及著米糝五味作羹亦得假蘇味辛溫無毒主寒熱唐本注即菜中荊芥是也陳者良主血勞風氣頭痛頭旋眼眩經驗方產後中風眼反折四肢搐搦下藥可立待應效以如聖散荊芥穗為末酒服二錢匕後方治一切風口眼偏斜青荊芥一斤青薄荷一斤一處砂盆內研生絹絞汁於瓷器內看厚薄煎成膏余滓三分去一分漉滓不用將二分滓日乾為末以膏和為丸如梧桐子大每服二十丸早至暮可三服忌動風物蔥實味辛溫無毒主明目食醫心鏡理眼暗補不足蔥實大半升為末每度取一匙頭水二升煮取一升半濾取滓葺米煮粥食良久食之又搗蔥實丸蜜如梧桐子大食後飲汁服一二十丸日二三服亦甚明目白蘘荷唐本注治稻麥芒入眼中不出以汁注眼中即出苦匏瓠千金方治眼暗取七月七日苦苦瓠瓤白絞取汁一合以酢一升古文錢七文和漬微火煎之減半以沫內目眥中又去翳法以石胡荽內鼻中翳自落亦名鵝不食草
