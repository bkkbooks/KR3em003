body:
  text: 附葆光道人眼科龍木集夫六識之中以眼為上稱為日月喻以驪珠記二兩下以玄黃臟四氣而通膽膽視故得身安明達規矩全軀莫貴乎斯上士之人自調五臟而能養神之安即使臟和和則眼目清潔時遇失養治療易痊縱有微疴容可驅遣中士之人猶能眼動靜自曉節宜設使氣厄亦能除矣下等之類損益既昧寒暄失宜但有疾證不能療矣遂有所傷者也故致如目者惟輕膜果里水水之性澄清不奈纖埃易致其損皎潔瑩淨無不鑑明貴如寶珠故曰明珠者凡舉動瞻視假借三光設若外視昧則內視昧則內視不明內明則外視即耀故眼五臟之中主也瞳人及黑晴腎之主也白睛應肺總管於肝明孔遍通於五臟氣若少亂目生患也五臟既安何敢有損是以枝病花衰根枯葉落若內有所傷則外生諸疾也又曰目者精氣之餘也心之主肝之管也五臟之精氣皆主於目骨之精氣為瞳人筋之精為白睛肉之精為約束是以筋血氣骨之精為目瞳人共成也夫憂愁思慮皆會於心神肝藏魂腎藏志肝為中將取決於膽會氣於心而主於目目者五臟之精氣也五臟有病皆形於目目赤則病在於心目白在肺目青在肝目黃在脾目黑在腎不可明者病在胸中氣失則目瞑氣絶則目暗肝氣通於目肝氣和則色明肝有病則目奪精而眩肝中寒則目昏而瞳人痛邪傷肝則目青目黑瞻視不明肝有實熱則眼痛如刺肝若虛寒則目眩流涕瞻視生花肝若勞寒則混而不欲開肝氣不足則目昏暗迎風有淚視物不明然沖睛目皆赤痛瘀肉生息睛目黃膽與肝合膽虛則陰邪所傷目中生花肝熱則目中多赤痛淚出肝不和則昏而熱中風欲疼則淚出文云肝久實熱目赤澀痛息肉故目者五臟中氣所成也又曰目中有五輪夫五輪者有風輪有血輪有氣輪有水輪有肉輪乃應於五臟隨氣所産也肝之色青其味酸屬東方甲乙木也旺於春氣通於左目屬甲為陽右目屬乙為陰肝主風故曰風輪也雖有其名而形狀難曉與水輪相輔之也心之色赤其味苦屬南方丙丁火也旺於夏心主血故曰血輪也血輪與肉輪相輔赤黑色是也此輪忌之針脾之色黃其味甘屬中央戊己土旺於四季各一十八日脾主肉故曰肉輪也肉輪在外鬱郁黃白金色也白睛也肺之色白其味辛屬西方庚辛金也旺於秋故肺主氣故曰氣輪也在肉輪之下隱而不顯也腎之色黑其味鹹屬北方壬癸水也旺於冬故曰水輪也水輪在四輪之內為四輪之母能以克明視萬物故乃呼為瞳仁肝臟有病應於風輪病則迎風有淚視物煙生夜退晝增澀疼裹白或青翳拂拂似蠅聯之狀此乃肺家之病也宜治肺經心臟有病應於血輪病則滿眼飛花兢起散亂縱橫胬肉漸沿目睛兩眥淚淹赤爛此心經之病也脾臟有病應於肉輪病則瞼生肉瞳人有病眥亂澀疼眼見飛花繚亂文如毛髮縱橫夜半即甚黃昏日午增於早起此脾經之病也肺臟有病應於氣輪病則如雲遮日逡巡即漸分明一如雲影申花或似飛蠅相趕此乃肝經受病也腎臟有病應於水輪病則滿眼黑花簇簇霧氣昏昏視一物如二物睹太陽如底此腎病也宜治腎經余皆仿此且夫病有多端其說非一今將眼科不能言詳細妄說多端在夫精妙一一具載於後五輪歌風輪肝木東方生木木生風本臟於肝在兩中飢飽不均生熱毒睛疼有翳熱浸瞳血輪心火心屬南方火丙丁熱風流入臟中停眼眥兩頭生赤澀遠視銅環似碎星肉輪脾土脾屬中央土最尊胬肉攀睛起黑雲胞沿腫痛羞明澀赤脈來侵障犯睛氣輪肺金臟肺停流熱毒生滿眸微覺滴乳輕但將涼藥宣腸胃免使昏昏滴血輪水輪腎水腎臟元來受賊邪上生兩眼內生花分明蝴蝶交加舞莫待朦朧似霧遮八廓歌關泉廓小腸之腑屬關泉受病先從心膽傳兩眥多生熱淚癢但調經脈自然痊養化廓三焦有病肝中藏冒暑衝風時犯光涼膈邪猶留中宮連投熱藥病難當抱陽廓內抱真陽是命門眼前花亂色難分不能補腎調肝膽赤脈交加熱有根傳道廓道傳為士本經根肺家壅滯熱風侵太陽若順應須愈病澀之時翳犯睛水穀廓食氣傷脾在胃中更加積熱兩相沖胞沿漸腫侵睛赤不解中宮熱不通津液廓膀胱為水腎為元冷熱相刑本截居青赤翳來輪廓內非憑妙手不能除清淨廓視物依稀似霧中似霧隱手障睛瞳更加冷淚頻頻下此是肝家虛冷攻會陰廓腎中之病有因由酒色氣多有帶憂莫道睛疼無大咎那堪障翳裹睛休夫眼者乃天地之日月也天地清淨日月光明天地昏瞑日月薄蝕經云眼應於肝旺在春三月作魂神寶眼為戶牖所通萬物無不睹之好惡是非自然分別自少及長疾病多般皆是謀養有乖致使眼目生患凡人多食熱物或食五辛喜怒無時淫欲不節沖寒冒暑坐濕當風恣意喧呼狂情啼叫長夜不寐天日無閒極目視高凝神遠望或久處煙火或博戲經時拈掇多年雕鐫畫繡燈下細書月中讀書皆能耗散精華大能損目更有馳騁田獵冒涉霜雪向日延風晝夜不息皆是損目之因恣一時之快意為目病之根源所以疾生眼目凡有養性之事必須慎之終身保息自然無憂永無眼目之患也鉤割針鐮法夫眼之內兩頭皆赤有息肉者宜鉤起以鈹針割取令盡如未全盡可再取之以盡為度或以鐮或以細針以線穿用口銜定線頭牽起以鈹針折起令離黑珠向日割之割了以火尉令斷其勢即不再生不然則二三年仍前發動生者黏睛不落則云難療須審細察之絶厚者入水輪即以細針篦子折起勿使損掣瞳人切須穩當不得粗心大膽瞳人前薄不易傷損凡鉤割取用針不得在旦旦則腹空即暈悶便倒須用人扶頭若有此疾皆是虛弱之人宜緩緩調理但凡鉤針不得一時促急取之須自斟酌漸次鐮脫遮無暈悶之患也若有赤脈胬肉宜針鐮也可看所患相應大宜仔細不可潦草便用此法恐有侵睛腫疼之患慎之慎之論眼捷法夫眼之聖功莫大焉且如眼生黑花者如不患眼相似何以辨之切須仔細看瞳人生黑角五六分者乃真黑花也此疾因損虛房室得之若瞳人間微小生黑角氣黑花也因飢飽勞心得之若熱花者只白暈侵睛可辨也若眼中生翳者從上生下者難治也自下而上者亦易治若頭尾生者亦可治也大凡肉障之眼宜仔細詳審緩看瞳人間裡有白者是肉障也凡五風患候者瞳人間盡是也此證切須緩緩推詳使患者復舊也論眼昏花捷要且夫醫眼之法最為多端非則一體不可以為輕慢如患目昏不明非有一狀肝腎虛而近視不快脾虛而見白花氣虛而瞻視茫茫血虛則飛蠅散亂血冷則瞳人開張腎虛則瞳人縮小或不明者氣不和也黑花散亂者乃精血虛也更迎風淚不止者或昏是思慮傷也膀胱損也最宜用和血壯氣切不可針鐮割點只宜服收花平補之藥也七十二問第一問眼赤痛者何也答曰此乃五臟積毒於肝之外家受邪熱使血亂於肝經故目赤而痛也服局方八正散局方八正散方車前子瞿麥扁蓄滑石甘草梔子木通大黃各等分上㕮咀每服一兩水二鍾燈心七莖煎至八分去滓食後溫服第二問目赤而不痛者何也答曰此肝之實也肝者血源其候在目血乃肝之實血盛則流入四肢血氣上衝流注於目血侵於睛睛受其血故赤而不痛宜用局方撥雲散祕方順肝散退赤散如治目痛熱淚流昏澀腫脹宜用祕方撥雲散方局方撥雲散方羌活防風柴胡甘草各等分上為末每服二錢水一鍾半煎至一鍾臨臥薄荷菊花茶清湯下亦得忌用藏鹽醬酢濕面炙爆發熱動風等物祕方順肝散方生地黃當歸大黃栝蔞仁各等分上為末每服一錢水一鐘調下或用新汲水半鐘調下退赤散方生地黃木通甘草梔子各等分上為細末每服二錢用竹葉湯調下食後日進三服祕方撥雲散方川芎荊芥薄荷甘草決明子當歸防風熟地黃木賊旋覆花大黃石膏各等分上為細末每服二錢食後用茶清調下如目赤胬肉侵睛者用淡竹葉湯調下第三問目赤者何也答曰此肝之虛也肝生木木生火火發木滅火屬心赤灌大眥侵睛則腫宜服祕傳黃耆丸活血煎當歸丸祕傳黃耆丸方黃耆蜜炙防風茴香炒白蒺藜炒牡丹皮各等分上為末酒糊為丸如桐子大每服三十丸食後鹽湯下或酒亦可婦人用艾醋湯下活血煎方當歸一兩地黃川芎香白芷羌活各五錢乳香沒藥各一錢另研上為細末煉蜜為丸桐子大每服三十丸薄荷荊芥湯下或茶清亦可當歸丸方上方祕傳黃耆丸內去黃耆加當歸名當歸丸第四問大眥赤者何也答曰此心實也五輪分布大眥屬心心者帝王南面之尊其候在大眥赤者乃心實也宜用三黃丸菊花散三黃丸方黃連去皮黃芩去蘆大黃各等分上為細末煉蜜為丸如桐子大每服三十丸熱水送下如臟壅實加栝蔞小兒積宜可服之菊花散方白蒺藜炒羌活去蘆木賊去節蟬蛻三兩去頭足菊花六兩去梗上㕮咀每服三錢食後臨臥茶清調下常服清利頭目洗肝去風忌發風淹炙爆等物第五問小眥赤者何也答曰此心之虛也心者五臟六腑之宗上應榮衛其屬南方之位五行生殺火生土土實則火虛小眥赤者心之虛也宜服茯苓散定光硃砂膏茯苓散方白附子玄參各五錢白茯苓七錢五分川續斷白殭蠶各一兩上㕮咀每服三錢水一鍾半煎至半鍾去渣溫服定光硃砂膏滑石水飛沙蜜各五錢硃砂片腦上為極細末煎蜜作膏每用銅箸點大小眥內立效第六問目睛多淚出者何也答曰此乃肺之實也肺乃西方庚辛金也金生水水發則流注金屬肺經則其色白五輪八廓經曰淚本肺之精華目出眵而硬者肺之實也宜用祕方瀉肺湯瀉肺湯方桑白皮地骨皮甘草各等分上㕮咀每服一兩水一鍾半煎至一鍾食後服第七問怕日羞明者何也答曰此脾之實也脾屬土土生濕氣氣結傳肺肺受脾邪上騰於目目受脾之濕氣脾主肌內熱難開屬太陽真氣騰其上土濕稍勝精華澀結不榮於目宜用祕方密蒙花散千里光湯局方羊肝丸千里光湯方千里光即石決明海金沙甘草菊花分兩同上㕮咀每服八錢水一鍾半煎至一鍾去渣食後溫服祕方密蒙花散方石決明煅木賊枸杞子白蒺藜青葙子羌活菊花蔓荊子各等分上㕮咀每服一兩水二鍾煎至一鍾去渣食後溫服局方羊肝丸白羊肝一具淨洗去膜黃連細羅上將羊肝先安盆內研爛旋旋入黃連末拌勻得所為丸如桐子大每服四十丸食後溫漿水下連作五劑諸般眼疾障翳青盲皆主之禁食豬肉及冷水第八問視物不明者何也答曰此脾臟虛也目輪屬五臟青黃白黑也黃輪屬脾即揭睛是也目本應其色青屬木脾土被肝木所克青黃相爭不青不黃目睛雜色而視物不明也宜服祕方蒼朮湯千里光湯方見前祕方蒼朮湯方蒼朮玄參甘草遠志茺蔚子各等分上㕮咀每服五錢水一鍾半煎至一鍾秦皮一片食後溫服渣再煎第九問眼常見黑花如繩牽者何也答曰此腎臟之實也腎屬水其應北方黑色乃肝之母母實肝腎之邪傷於經膽者目之經神水之源腎邪入目時復落落蠅羽者腎之實也宜用祕方豬苓湯苦參湯祕方豬苓湯方豬苓木通梔子大黃金毛狗脊萹蓄各等分上㕮咀每服五錢水一鍾半煎至一鍾去渣溫服無時苦參湯方苦參地骨皮各半兩丹參三錢乳香三錢另研上㕮咀每服五錢水一鍾半煎至一鍾去渣溫服無時第十問迎風有淚者何也答曰此腎家虛也五輪曰黑睛屬腎肝屬木木生風腎屬水水枯不能滋木故迎風有淚腎之虛也用石燕子散艾煎丸蠶沙湯服此藥一止其淚大有神效石燕子散方石燕子一雙煅醋淬十次玳瑁羚羊角各一兩犀角五錢上為末用好酒薄荷湯或茶清食後調下艾煎丸方艾葉醋炒肉蓯蓉川牛膝酒浸甘草桑葉向東者用山藥牛膝炒當歸各等分上為末極細煉蜜為丸如桐子大每服十丸茶清調下蠶沙湯方蠶沙四兩炒巴戟去皮川楝肉馬藺花各二兩去梗上為細末每服二錢無灰酒不拘時候調下第十一問目中紅筋附睛者何也答曰此乃心之肝也心屬火火主血肝屬木木主筋血侵於筋者肝之候血者肝之源傳入目漸灌瞳人故曰侵睛也宜服當歸散主之當歸散當歸防風苗炮蒺藜炒牡丹皮各等分上為末每服二錢生蔥薄荷茶清調下或作㕮咀煎服亦可第十二問白膜遮睛者何也答曰此乃肺克肝也肝屬木肺屬金金能剋木金色白風邪肺克肝也甚則火旺白輪勝者輪在睛上復即灌交是母子相刑五花白膜遮睛故金剋木宜用祕方連翹散蟬花散密蒙花散方在七問下祕方連翹散方連翹梔子甘草朴硝黃芩薄荷各等分上為末每服三錢茶清調下無根水亦可祕方蟬花散方蟬花一兩菊花四兩白蒺藜二兩上為末每服三錢清水調下第十三問目中迎風受癢者何也答曰肝邪自傳肝屬木風動即癢也宜用祕方二處膏局方明目地黃丸祕方二處膏將田螺養開掩入黃連末焙乾為末入腦麝二味各少許綿裹泡水洗眼明目地黃丸生地黃洗熟地黃各一兩牛膝三兩各浸石斛枳殼炒防風各四兩杏仁二兩去皮尖火炒黃細研去油上為細末煉蜜為丸如桐子大每服三十丸空心溫水下或米湯下忌一切風動諸物第十四問目中常早晨昏者何也答曰此乃頭風攻衝於頭目者太陽之首肝臟為陽氣旺故使頭風攻注於目宜服局方芎菊散白蒺藜散石膏散局方芎菊散方川芎菊花甘草各一兩薄荷二兩防風七錢半白芷五錢上為末每服三錢食後茶清下傷風頭眩用無根水調下尤速白蒺藜散方白蒺藜細辛萹蓄白芷香各等分上為細末每服一錢米湯調下或溫酒亦可食後日進三服石膏散方石膏石決明煅荊芥白芷川芎防風旋覆花各等分上為細末每服一錢食後薄荷生蔥茶清調下日進三服第十五問常目中昏者何也答曰乃痰之所作也在巳午時真陽之氣火勝心勝肺肺壅痰災時復渾渾而昏也宜用局方辰砂化痰丸局方玉壺丸局方辰砂化痰丸方枯白礬辰砂五錢南星一兩炮半夏一兩上將白礬半夏南星為末和勻生薑汁煮麵糊為丸桐子大每服十丸食後薑湯下仍用硃砂為衣亦治小兒風壅痰嗽一歲服一丸搗碎用薄荷生薑調下局方玉壺丸散南星半夏天麻各五錢重羅白麵三兩上為細末滴水為丸如桐子大每服三十丸水一鍾煎沸令下藥煮五七滾候藥浮漉出別用生薑下不拘時第十六問目常暮昏者何也答曰此腦者天真萬物行於陽道不行陰道至申酉戌時寒氣欲生腦損則風寒所致目中微昏不真到晚宜衣灸風火穴第十七問目夜間昏者何也答曰此陰毒腎盛也經云陰好靜陽好動血散漫而不行陰道寒邪克之致使寒氣太盛寒氣者屬陰旺在申時乃一陽之氣生故夜痛目昏宜用六問瀉肝湯九問內苦參湯第十八問目中浮翳遮睛者何也答曰此乃肺經大熱肺者西方庚辛金其色白肺者氣之源氣盛則熱血盛則寒肺之熱氣灌注瞳人木之氣白膜者肺之苗根盛苗盛白膜遮者肺經熱也宜用二問順肝散四問局方三黃丸六問瀉肺湯第十九問旋螺突睛者何也答曰此睛損也目者五臟之源六腑之宗臟腑積熱外發於肝臟肝臟更衰而發瘡癤膿血結硬其睛突也宜用祕方琥珀膏救睛丸祕方琥珀膏方一名立蛻散一名定志丸人參二錢石菖蒲炮天門冬去心遠志去心預知子各一兩白茯苓麥門冬各一兩去心上為細末煉蜜為丸如桐子大每服十丸硃砂為衣茶清下或水亦可救睛丸方梔子薄荷葉赤芍藥枸杞子各二兩蒼朮三兩上為末酒糊為丸如桐子大每服三十丸井花水送下或茶清下亦可年壯之人可服如是年老之人可於前方內加茯苓三兩尤妙第二十問目睛倒出者何也答曰臟之損也眼應五行青黃赤白黑內應心肝脾肺腎五臟者目宗源睛深枯入者五臟損也宜服前祕方琥珀膏方見十九問下第二十一問青膜遮睛者何也答曰此病證是外障也目神為水之源精華之腑五臟蘊積攻衝外發於目目屬肝其色青宜用蟬花散方見十二問下順肝散方見二問下祕方洗肝散許學士方祕方洗肝散方熟地黃大黃梔子當歸甘草乾葛各五錢赤芍藥甘松黃芩各三兩上為細末每服三錢米泔調下許學士方大黃芍藥石決明煅黃芩人參梔子甘草各等分上為細末每服三錢食後清水調下第二十二問瞳人倒者何也答曰此病多是內障病五行應變應變升為氣氣血皆衰榮衛凝滯不得榮於目也宜用救睛丸方見十九問下活血煎方見三問下祕方琥珀膏方見十九問下祕方生犀角丸生犀升麻湯祕方生犀角丸方犀角麻黃防風石決明當歸楮實子枸杞子各等分上為細末麵糊為丸如桐子大每服三十丸茶清下小兒量大小加減丸數生犀升麻湯方犀角一兩一線川升麻防風白附子白芷黃芩各五錢甘草一錢上㕮咀每服三錢水一鍾半煎至一半鍾去渣再煎日進三服在食後第二十三問頭暈眼見赤亂星亂者何也答曰此乃血衰也血者心經也周流百脈於六陽之首陽經不行故目昏也宜用活血煎方見三問下地黃丸石膏散方見十四問下此方按素問云久血傷血血主肝故謹書傷肝主目昏肝傷則自生風熱氣上湊目故昏也此藥大能養血明目其功不可盡述地黃丸系許學士方熟地黃兩半決明子黃連各一兩黃芩防風桂心沒藥羌活硃砂各五錢菊花五錢去根上為細末煉蜜為丸如桐子大每服三十丸熱水下第二十四問目不疼不癢而赤昏者何也答曰此血聚也經云榮屬陽衛屬陰陰好靜陽好動血氣流行氣乃升降榮衛通矣血聚則成癰疽血滯則麻而不癢不痛宜用蟬花散方見十二問下順肝散方見二問下祕方勻氣散祕方勻氣散方香附子炒甘草蒼朮茴香各一兩上為細末每服三錢鹽湯調下第二十五問目赤而不熱痛者何也答曰此血實也經屬陽絡屬陰經主氣絡主血氣盛則壅血盛則肝實也應於目故赤而不熱痛血實也宜服當歸散方見十一問下第二十六問血侵睛者何也答曰此肝經虛熱也肝之外候津液之府道路宗脈之所聚也邪熱法於肝經虛則血流走於兩目故赤而侵睛也宜用連翹散方見十二問下順肝散方見二問下祕傳鬱金散祕傳鬱金散方鬱金大黃朴硝等分上三味為末用桃條生地黃自然汁調服點瞳人第二十七問目久昏如物遮者何也答曰此為實也榮主血衛主氣上為天下為地內經曰清氣為天濁氣為地清陽走腠理濁陰走五臟五臟者應於心肝脾肺腎也受衛之氣流於兩目故昏如物遮睛者用豬苓湯方見十九問下連翹散方見十二問下第二十八問目痛而憎寒者何也答曰此為虛也衛為陰而無陽榮為陽而無陰經曰榮者肝之司衛者腎之府腎屬北方水為邪乘一府榮邪痛而憎寒也用祕方蟹黃散祕方蟹黃散方黃連黃芩蒲黃鬱金梔子秦皮當歸滑石白殭蠶五倍子薄荷白杏仁各五錢銅緑一錢杏仁洗七枚去皮尖別研上㕮咀每服三錢水一鍾半煎至一鍾頻頻暖洗如冷再暖無時洗第二十九問目痛而身熱者何也答曰榮之實也榮屬陽而能發熱衛屬陰而能發寒榮衛乃陰陽之道路在上屬心在下屬肝與腎目痛而身熱在心也少陰君火之化宜用祕方洗心散菊花散祕方洗心散荊芥甘草菊花大黃當歸芍藥各等分上㕮咀每服三錢水一鍾半煎至一鍾食後生薑薄荷少許同煎去渣溫服祕方菊花散菊花甘草防風荊芥蟬蛻大黃石決明各等分煅上七味為細末每服三錢水一鐘調服茶亦可食後臥時服第三十問目乍暗者何也答曰此乃榮衛俱虛也榮衛者陰陽之道路心肝之宗源榮衛流則血氣行榮衛相爭而不及衛也故目時復乍明乍暗宜用活血煎方見三問下艾煎丸方見十問下第三十一問目患左赤而傳右者何也答曰此乃陽經太旺也陰中之陽心也陽中之陰肝也心中邪熱蘊積於肝肝交於心邪傳本源也左目屬太陽右目屬太陰此乃太陽經之旺也宜用洗心散方見二十九問下三黃丸方見四問下第三十二問目患右赤而傳左者何也答曰此陽經太旺也目有陽絡有陽經有陰絡有陰經陰經屬血如目赤右傳之於左乃肝經邪熱經脈太旺也宜用瀉肺湯方見六問下退赤散方見二問下第三十三問目患左右相傳者何也答曰此乃血之邪氣攻衝肺臟不足為風邪所使熱氣相爭也宜用密蒙花散方見七問下祕傳珍珠膏祕傳珍珠膏方蒼朮三兩穀精草甘草木賊川芎荊芥草決明楮實子羌活各等分蟬蛻一個上為末煉蜜為丸桐子大每服十丸茶清送下第三十四問目赤而癢澀者何也答曰此風邪攻衝也肝者厥陰之經而風邪內外相攻風熱相傳氣血痞澀時復氣邪相動是作癢且澀宜用二處膏方見十三問下第三十五問目之兩瞼赤爛者何也答曰此乃風濕氣使之也目者精華之宮魂魄之所聚血脈之源陰陽之首經絡之源風邪客於腠理濕氣相爭停於兩瞼目時赤爛濕之故也宜用洗心散方見二十九問下艾煎丸方見十問下二處膏方見十三問下第三十六問目晴通黃者何也答曰此乃酒之毒也或渴之時飲酒如漿或好酒侵入四肢隨入經絡流注往來上下致使血潮於目酒之濕熱流注於目使目俱黃也宜用局方三黃丸方見四問下第三十七問目不能遠視者何也答曰此乃榮傷於五臟六腑之間目者肝之外使風邪客之使精華之府衰弱肝氣不足則不能遠視也宜用蟬花散方見十二問下羊肝丸方見七問下第三十八問目患每年常發者何也答曰此證隨天地同少陽旺復得甲子陽明旺復得甲子太陽旺復得甲子太陰旺復得甲子六十日三百六十日其氣一周今太陽受病復得來年六十日而當發宜令瀉之如太陽受病只瀉太陽經膀胱是也第三十九問目中拳毛倒睫者何也答曰脾之損也脾之主肌肉肌肉消瘦則飲食不能進外感風邪克於腠理故毒生於目也宜用局方省風湯豬苓湯方見九問下局方省風湯方防風去苗南星各四兩生用半夏白好者生用浸洗之甘草黃芩各二兩上㕮咀每服四錢水二鍾生薑十片煎至一鍾去渣溫服不拘時服第四十問目中漏睛膿出何也答曰此乃五臟冷熱相攻腎敗也宜服寶光散寶光散方大黃龍膽赤芍藥川芎白芷牛蒡子防風防己黃芩當歸甘草梔子生地黃細辛羌活荊芥各等分上㕮咀用水一鍾半煎至一鍾去渣食後溫服第四十一問目中胬肉侵睛者何也答曰此脾之實也脾者倉廩之官肌肉之府毒氣攻衝風邪之氣衝肺肺受脾邪傳之於目故胬肉侵睛也宜用羊肝丸方見七問下三黃丸方見四問下撥雲散方見二問下局方紫金膏局方紫金膏方硃砂另研乳香另研硼砂另研赤芍藥當歸各二兩洗雄黃二錢水飛麝香半兩另研黃連五錢上為細末入研藥內拌勻再擂煉蜜為丸皂角子大每用一丸安於淨盞內沸湯泡開於無風處洗眼藥冷閉目少時候三兩時再煨令熱依前洗之一帖可洗三五次不可犯銅鐵器內洗如暴赤眼及瞳者不可洗之第四十二問目數赤點者何也答曰風邪傷肝主風目胡則傷目昏赤肌肉虛熱則邪氣肝之故目病積年不瘥也用宜省風湯方見四問下活血煎方見三問下牡丹煎丸牡丹煎丸方延胡索砂仁各半兩赤芍藥牡丹皮各一兩山茱萸乾薑各半兩炮龍骨細研熟地黃酒浸檳榔羌活各三兩五味子人參白芷當歸酒浸乾山藥肉桂去皮白茯苓白朮藁本附子炮去皮臍木香牛膝酒浸蓽茇各一兩水泡石斛三兩酒浸上為細末煉蜜為丸如桐子大每服二十丸溫酒或醋湯空心下日進三服孕婦不可服第四十三問兩眼非時腫赤者何也答曰此風腫也目乃肝之候肝虛不足冷熱相爭邪主於目及瞼結而邪熱不散因風而發眼腫故也宜用洗肝散方見二十一問下祕方犀角消毒飲子祕方犀角消毒飲方防風荊芥穗鼠黏子甘草各等分上㕮咀每服三錢水一盞煎至七分去渣溫服不拘時候第四十四問眼珠脫出者何也答曰此臟腑陰陽不和也目者陰陽之精魂魄之宗肝之候陰陽不和蘊積生熱痰飲五臟之中攻衝於目故使眼疼甚則珠脫出者宜用救睛丸方見十九問下第四十五問目常見黑花者何也答曰肝虛之故也目者肝之候臟腑之精華氣血津液之宗氣血不足虛不能榮於神目常昏暗時時見如黑綿羊胎毛宜服羊肝丸方見七問下第四十六問目中瘀肉血潮於睛者何也答曰此厥陰旺也肝之脈起於大指聚毛之際云云肝上連目系本經血氣大旺風熱攻盛或赤或白或往或來皆於血所使也宜用退赤散方見二問下椒紅丸椒紅丸方沉香莪朮訶黎勒去核椒紅微炒去汗丁香高良薑麻油各五錢炒附子炮去皮當歸酒浸白朮各一兩麝香肉豆蔻炮各一錢上為細末入麝香令勻酒煮糊為丸如桐子大每服三十丸溫酒下無時第四十七問目澀者何也答曰此乃動臟腑也或啼哭泣出太過冷淚不止液通開而不閉液道枯乾臟腑邪熱傳於衛真氣不榮於目故目澀也依用羊肝丸方見七問下三黃丸方見四問下二處膏方見十三問下第四十八問凡大病後目昏昏者何也答曰五臟不調陰陽之閉塞血氣不牢神光則落落昏潰乃血氣虛極也宜用黃耆丸方見三問下第四十九問陽毒病後目微昏者何也答曰下元極虛也五臟為陰六腑為陽六經宣利即臟腑虛弱脾胃不和肌肉未復勞動血氣肝臟虛弱肝氣內虛以攻雙目微昏也宜用黃耆丸方見三問下椒紅丸方見四十六問下祕方柴胡湯祕方柴胡湯方柴胡胡黃連黃連厚朴半夏各等分上為末每服二錢水一鍾半煎至一鍾食後服第五十問陰毒病後目微昏者何也答曰或服毒熱藥或針或灸火氣焮痛風邪衝擊新病後起早肝氣大盛風火相併故目昏也宜用三黃丸方見四問下菊花散方見四問下第五十一問遇水目昏者何也答曰此冷氣攻肝水者先入兩足令腫也而足經足經少陰腎之井穴名曰湧泉乃腎經所起水入膀胱真榮被傷上攻於肝水氣侵及於足邪氣攻衝故目昏也宜用豬苓湯方見九問下艾煎丸方見十問下第五十二問孕婦目昏者何也答曰此血氣之候妊孕少血氣胎氣不榮於肝肝氣不足故昏也宜用椒紅丸方見四十六問下牡丹煎丸方見四十二問下羊肝丸方見七問下第五十三問婦人産後目睛昏者何也答曰此乃五臟之虛也婦人妊孕時當出血一斗三升肌肉氣寬緩骨節筋脈其神氣已虛五臟不牢六腑未安自賴五臟六腑為根根乏則苗衰故目昏也宜用椒紅丸方見四十六問下菊花散方見二十九問下活血煎方見三問下第五十四問初生小兒未經兩月目爛者何也答曰此胎熱也小兒初生之時浴湯已冷穢濁浴之未盡拭之未乾兩月胞瞼之間感於外風以致赤爛也宜用連翹散方見十二問下第五十五問小兒出瘡疹初發於目中者何也答曰子在母腹中飲其血氣其胎胞穢濁以生故發瘡於目宜用犀角消毒飲方見四十三問下密蒙花散方見七問下第五十六問小兒眼中生白者何也答曰此肺壅痰實熱熱傷於肝肝屬於木木者清秀之物也痰實熱氣攻衝灌注瞳人瞳人損動黑睛白交散漫於兩間為障也宜用救睛丸方見十九問下柴胡湯方見四十九問下順肝散方見二問下琥珀膏方見十九問下第五十七問小兒睛生翳障者何也答曰臟腑之間精華之氣小兒純陽感於風熱內有熱痰散於肝經沖攻於目故以交變變生翳障宜用蟬花散方見十二問下菊花散方見二十九問下第五十八問小兒雀目者何也答曰小兒蘊積於熱風邪客於肝經肝血凝滯不散陰陽不和榮衛不通使目夜昏有如雀目也宜用三黃丸方見四問下復明散復明散方蒼朮一兩去皮穀精草一兩地膚子決明子黃芩各半兩上㕮咀每服五錢入荊芥少許水一盞煎至七分去渣食後服第五十九問小兒目患青盲者何也答曰臟腑虛弱也因傷冷物至極氣不能宣通赤而不痛全無障翳致使白日視物不見也宜用蟹黃散方見二十八問下菊花散方見二十九問下犀角消毒飲方見四十三問下第六十問目中生瘡者何也答曰此風邪客於腠理風血散傳蓋因浴洗之時拭之未乾穢汙侵潰受風即發如粟米之狀連眶赤爛遂成瘡疾名宿胠風宜用省風湯方見三十九問下局方三白散局方三白散方白牽牛二兩桑白皮微炒木通陳皮各半兩去白上為細末每服三錢空心煎生薑湯調下第六十一問目患瞼生粟者何也答曰脾肺受邪也脾者肌肉之府腑者皮毛之源邪氣相搏肝經虛弱風盛即發於兩目瞼之間狀如粟米之形遂成此症也宜用省風湯方見三十九問下第六十二問目患青盲翳者何也答曰肝乃木之原津液之道路五臟風熱甚發於目瞼如粟米之狀是以如此也宜用省風湯方見三十九問下第六十三問患瞑目之疾者何也答曰瞑者流也風邪客於目則昏精液不足目眥常散癢冷淚不絶遂成瞑目也宜用當歸散方見十一問下艾煎丸方見十問下第六十四問目常膿漏者何也答曰目者五臟之宗六腑之華津液之道風邪客於兩目冷淚相攻瞳人內損故成此患宜用救睛丸琥珀膏方俱見十九問下第六十五問婦人目生偏視者何也答曰此是陰陽之邪氣攻衝發於目內臟腑偏衰陰陽不和或一日二日見宜用救睛丸方見十九問下第六十六問目生得大小不均者何也答曰目者臟腑之精華血脈之宗源風邪客於目衝於經絡肌肉痞澀血氣凝滯故使兩目大小不勻遂成此狀宜用省風散方見三十九問下第六十七問目患或青或赤者何也答曰此邪熱沖肝攻於五臟之內上運於目使瞳人潰注灌經於外或青或赤或黃或黑往來不定故也宜用羊肝丸方見七問下三黃丸方見四問下三白散方見六十問下第六十八問目患或針或割或取翳障全痛不止者何也答曰目者經絡之苗五臟之精華經絡之道路既而割損痛不止出血不定宜用牡丹煎方見四十二問下三白散方見六十問下第六十九問目中多眵淚者何也答曰此乃經絡蘊熱因食煎爆太過故目多眵淚也宜用洗心散方見二十九問下連翹散方見十二問下第七十問目中常流淚者何也答曰乃肝經之虛也經曰肝虛則本枯故流冷淚不止也宜用洗心散方見二十九問下羊肝丸方見七問下此外又有二說一說老人冷淚不止乃精血俱虛宜用祕方胡椒丸一說有頭風目中常流冷淚者宜用許學士方一方治老人冷淚不止胡椒丸用胡椒一味為末黃蠟溶化為丸如緑豆大每服五七丸食後茶清下白朮散方許學士方白朮川芎羌活細辛白芷荊芥菊花決明子各五錢菊花散方菊花川芎細辛白芷白朮各等分上為細末煉蜜為丸如桐子大每服三十丸食後白滾水下第七十一問如目打損被物傷者何也答曰此乃瘀血流聚於上而攻目可以散其血脈宜用鬱金散方見二十六問下蟹黃散方見二十八問下羚羊角散五退散羚羊角散方羚羊角甘草黃連梔子川升麻車前子各十兩龍膽草決明子各二十兩上為細末每服三錢米飲湯調下若小兒可服半錢日進三服五蛻散方蛇蛻鳳凰蛻即雞卵殼人蛻即指甲佛蛻即蠶蛻蟬蛻各等分同燒灰研細和勻一處再研百遍上為極細末每服二錢豬肝蘸吃不拘時日進三服第七十二問目中有翳往來不定者何也答曰此乃是血所病也蓋心能生血肝能藏血肝受血則能視物治目病不可不治血此五靈脂入肝最宜用明目靈脂丸明目靈脂丸五靈脂二兩川烏一兩半炮去皮沒藥二兩乳香二兩上為細末滴水丸如彈子大每服一丸生薑酒磨下
