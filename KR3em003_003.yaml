body:
  text: 卷之三二十四肝虛積熱外障此眼初患之時忽然發動赤色淚出翳生或退或聚或散初時即輕如經一二年間漸重瘀目不明即冤神鬼祈求此疾皆因肝家勞熱所作毒風入腦眼中覺患宜眼藥將息不得燒炙頭面可服瀉肝湯青葙子丸及硃砂煎點之立效詩曰用力勞神赤痛來睛瞳怕日淚難開有時發動有時退怨鬼求神作禍胎忽爾翳生還自可須知肝膈熱榮排急求湯藥先除去根株莫遣臟中理一眼初時生作患相牽後眼莫相違今年發動輕輕過後歲應多轉轉危丸藥青葙須至服鈹鐮雙瞼血相牽眼中宜點硃砂藥但炙頭中即易為瀉肝湯黃耆大黃黃芩知母芒硝各一兩桔梗一兩上為末以水一盞散一錢煎至五分食後去渣溫服青葙子丸青葙子車前子細辛乾地黃菟絲子防風茺蔚子五味子人參澤瀉茯苓各一兩上為末煉蜜為丸如桐子大空心茶下十丸硃砂煎龍腦一分乳香二分硃砂半兩細辛白芷黃連秦皮各一兩上為末以水浸一復時去渣用汁以蜜五兩煎之點眼二十五傷寒熱病後患目外障此眼初患之時或因傷寒起早熱病後臟氣未全六腑之熱未盡體虛易損過食熱物過多致令患眼或見黑花瞳人開大發歇不定赤腫淚出宜令鐮出瘀血服熊膽丸生犀角飲子瀉肝湯切不可點藥恐損睛也詩曰熱病傷寒可後虛因餐壅熱患雙眴睛疼一日先昏暗不久相牽左右拘紅腫必須鐮瞼內生犀飲子最能驅次服決明丸半劑免教白肉更須瘀未宜點眼緣何事卻恐生瘡敗黑珠瞳子忽然開黑大舊來肝腎有風虛神方用膽點和服雙目光明卻復初若是眼前花出現三年兩載始能除熊膽丸熊膽一個石決明車前子澤瀉細辛各一兩乾地黃茺蔚子各二兩黃牛膽一個上為末煉蜜為丸如桐子大空心茶下十丸生犀角飲子生犀角桔梗各二兩羚羊角人參茯苓黃芩知母防風各一兩上為細末以水一盞散一錢煎至五分去渣溫服瀉肝湯石決明川大黃桔梗車前子芒硝各一兩羚羊角防風各兩半上為極細末以水一盞散一錢煎至五分去渣溫服之二十六混睛外障此眼初患之時先疼後癢磣澀淚出怕日羞明白睛先赤發歇無定漸漸眼內赤脈橫立遮睛如隔紗看物難以辨明此是毒風在肝臟積血瞼眥之間然也初患宜令鐮洗鉤割莫熨烙去除根本然後宜服涼肝散點七寶膏服退翳丸立效詩曰白睛先赤作根基痛癢風吹淚出眵磣澀難開旬日內發無定體有瘳時年深漸變時為碧滿目凝眵如覺之赤脈如絲橫與豎混睛外障莫狐疑毒風赤血成其量如此誰言可易醫冷澀藥中須得妙點摩翳膜盡為期頻鐮雙瞼同篦烙風熱平時即住之湯藥稍和年歲服要除根本莫鐮遲涼肝散川大黃桔梗各半兩黃芩羚羊角黑參人參茯苓各一兩上為末以水一盞散一錢煎至五分食後去渣溫服七寶膏珍珠水晶貝齒各一兩琥珀石決明各三分空青瑪瑙龍腦各半兩上為末研令細勻水五升石器內煎至一升去渣煎至一盞入蜜半兩煎和為膏每至夜臥時點之早晨不得點退翳丸白芷細辛五味子枳殼各一兩去瓤麩炒牡蠣茺蔚子各二兩上為末煉蜜為丸如桐子大空心米飲湯下十丸二十七胬肉侵睛外障此眼初患之時或癢或痛赤爛多年肺臟風壅發無定準漸生肉翳侵睛遮滿瞳人此狀宜令鉤割熨烙後宜服除風湯七寶膏立效詩曰胬肉根基有兩般便須分別見根源或因赤爛多年後肺臟風沖亦使然或癢或痛無定準一條根肺漸侵滿初生浮小鉤除易覆著瞳人即稍難去熱去風先服藥終須割烙即長安殘餘服藥徒能效七寶銷磨當自痊除風湯防風黃耆茺蔚子各二兩桔梗五味子細辛大黃各一兩上為末以水一盞散五錢煎五分食後去渣溫服之七寶膏珍珠末龍腦熊膽各一分石決明琥珀各三分水晶龍齒各五錢上搗碎為末研令極勻水五升石器內煎至一升去渣煎至一盞入蜜半兩和為膏每至夜臥後點之早晨不可點二十八兩瞼黏睛外障此眼初患之時或癢或痛年多風赤瞼中有瘡因熱在肺膈脾胃風壅致令兩瞼相黏即宜鉤割熨烙服排風散烏犀丸立效詩曰兩瞼黏睛何所論多年風赤是其因睛疼瞼澀皮肉爛瘡可相黏似有筋割烙只須多出血銅篦燒赤烙玄門治風丸散須頻服年歲中間只去根排風散天麻桔梗防風各三兩烏蛇五味子細辛芍藥乾蠍各二兩上為末空心食後米飲湯調下一錢烏犀丸烏犀茯苓芍藥細辛黑參人參各一兩乾山藥羌活各二兩上為末煉蜜為丸如桐子大空心茶下十丸二十九膜入水輪外障此眼初患之時肝臟積熱虛勞年多發歇有時睛上有瘡疴後更生障翳漸入水輪因大腸壅滯致使熱也宜服退熱飲子鉤割熨烙鐮洗宜服補虛鎮心丸即瘥詩曰黑上生瘡疴後痕積生胬肉漸相侵時多常覆過痕了因此名侵入水輪雖即三光微可睹烏珠沉下必氤氳庸醫猛浪強鉤割遂使雙眸轉更昏退熱飲子防風黃芩茺蔚子桔梗各二兩大黃黑參五味子細辛各一兩上為末以水一盞散一錢煎至五分食後去渣服之補虛鎮心丸石決明人參茯苓大黃各一兩遠志細辛乾山藥防風各二兩上為末煉蜜為丸如桐子大空心茶下十丸三十釘翳根深外障此眼初患之時眼中疼痛作時赤澀淚出怕日治療失時致令睛上有翳如釘頭子相似不宜鉤割熨烙難得全效宜令服藥此是熱毒在於肝心宜服除熱飲子鎮心丸即瘥詩曰滯留邪熱在肝心疼痛生瘡那可任毒藥既深開得後眼前翳入黑暗深萬藥雖然磨不盡能除發歇解愁襟若乖忌省無堅固恐怕瘢痕轉更深除熱飲子黃芩黑參桔梗知母芒硝各二兩防風大黃茺蔚子各一兩上為末以水一盞散一錢煎至五分每日空心食後去渣溫服鎮心丸遠志人參茯苓柏子仁細辛各二兩乾山藥茺蔚子車前子各一兩上搗羅為末煉蜜為丸如桐子大空心茶下十丸三十一黑翳如珠外障此眼初患之時忽然疼痛難忍淚出不開有翳如黑珠子在黑眼上如是大人患者肝腎俱勞毒風入眼如此疾狀不宜針灸觸發即服補腎丸如小兒患者即是實熱急疳宜服羚羊角飲子即瘥詩曰黑翳珠排黑水間醫工會者始知難如神藥點翻為極藥用湯丸即得安不用強看將手擘恐因手重出青涎庸醫挑發並燒香要見三光路更難羚羊角飲子羚羊角五味子細辛大黃知母芒硝各一兩防風二兩上為末以水一盞散一錢煎至五分食後去渣溫溫服之三十二花翳白陷外障此眼初患之時發歇忽然疼痛淚出立時遽生翳白如珠棗花陷砌魚鱗相似此為肝肺積熱壅實上衝入腦致生此疾切宜服藥治療不得失時恐損眼也宜用摩頂膏摩於頂內然後服知母飲子兼服山藥丸立瘥詩曰忽生白翳簇瞳人點點如花陷砌鱗肝肺伏藏多壅實上衝入腦病為根膏摩頂上除風熱湯飲除肝服要頻酒面休餐諸毒藥莫因小事發貪嗔摩頂膏子鵝脂牛酥木香各一兩鹽花一兩半硃砂龍腦各一分上搗羅為末和成膏每日兩度摩之頂上立效知母飲子知母茺蔚子各一兩防風細辛各一兩半桔梗大黃茯苓芒硝各一兩半上為末以水一盞散一錢煎至五分食後去渣溫服之山藥丸乾山藥二兩人參茯苓五味子細辛各一兩乾地黃防風各一兩半上為末煉蜜為丸如桐子大空心茶下十丸三十三冰瑕翳深外障此眼初患之時或癢或疼發歇不定作時赤脈淚出眵漫致令黑睛上橫立似青眼多少不定久後為患全損眼目此疾不可挑撥莫去鉤割宜服茺蔚子散除熱人參湯點退翳清涼散立瘥詩曰黑睛橫豎點青瑕似翳沉沉少與多醫者細看如此狀根沉入黑莫挑摩老憂久後添為患除熱除風藥最嘉出入不妨須謹慎志心醫療別無他茺蔚子散茺蔚子防風各二兩黑參細辛大黃枳殼知母芒硝各一兩芍藥一兩半上為末以水一盞散一錢煎至五分食後去渣溫服人參湯人參茯苓五味子桔梗大黃黑參黃芩車前子各一兩黃芩知母各兩半上為細末以水一盞散一錢煎至五分食後去渣溫服清涼散馬牙硝白礬曾青各一兩半龍腦青黛各一分上搗為細末研令勻細為妙每至臨臥時用散乾點半字在眼內三十四玉翳浮滿外障此眼初患之時或時疼痛皆是毒風上衝入腦積熱在於肝隔之間致令眼內有翳如玉色相似遮滿瞳人如此疾不宜針割熨烙宜服退翳散立效詩曰黑上浮雲如玉色還因瘡疴後留根在施磨翳膏和散拱手神醫無妙門服藥治風兼去熱還睛丸散是其因燒香供養龍樹主覓取來生清淨根退翳散石決明大黃細辛黃芩車前子各一兩防風二兩芍藥一兩半上為末以水一盞散一錢煎至五分食後去渣溫服三十五因他病後生翳外障此眼初患之時或即赤爛漸生翳膜侵睛蓋定瞳人即無所見醫者細看翳心若不赤黃猶見光明宜令鉤割熨烙後點爛翳散服細辛散詩曰眼因他患後漸漸失光明初覺微生膜經年翳厚成遍通睛上黑日久赤黃生火燒銅箸烙用意手輕輕爛翳散硃砂石決明珍珠末各半兩曾青硇砂龍腦各一分上搗研細每至乾點眼內立效細辛散細辛茺蔚子各二兩黑參黃芩桔梗大黃各一兩車前子一兩半上為末以水一盞散一錢煎至五分食後去渣溫服
