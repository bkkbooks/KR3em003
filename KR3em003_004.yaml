body:
  text: 卷之四三十六逆順生翳外障此眼初患之時皆因五臟虛勞風熱衝入肝膈之間漸漸生翳或後上生向下或從下生向上名曰順逆障亦用鉤割尉烙點膜去除暈膜然後宜服補勞人參丸知母飲子立效詩曰此眼眸有翳逆順要須知從下生為逆名醫效亦遲消停經日月湯藥至還生尉烙並鉤割塗磨散卻宜下來生順逆治法宜如之效速非同逆忌省即依依補勞人參丸人參茯苓桔梗乾地黃防風木香桂心乾山藥細辛各一兩上為末煉蜜為丸如桐子大空心茶下十丸知母飲子知母茺蔚子車前子各二兩黃芩桔梗大黃五味子各一兩上為末以水一鍾散一錢煎至五分食後去渣溫服三十七雞冠蜆肉外障此眼初患之時皆因脾胃積熱肝臟受風漸漸入眼致生翳膜如雞冠蜆肉其肉或青或赤此疾宜令鉤割鐮洗尉烙然後宜服抽風湯除熱茺蔚丸即瘥詩曰眼中生翳似雞冠療者應須翻出看蜆肉或青或赤黑不嫌割烙始能痊要除風熱憑湯散須要曾青點病源若言根本未痊愈志心多服決明丸抽風湯防風二兩大黃細辛桔梗各一兩黑參黃芩芒硝車前子各一兩半上為末以水一盞散一錢煎至五分食後去渣溫服茺蔚丸茺蔚子人參乾山藥各二兩茯苓石決明大黃黑參黃芩各一兩乾地黃一兩半上為末煉蜜為丸如桐子大空心茶下十丸三十八瞼生風粟外障此眼初患之時皆肺臟壅毒大腸積熱肝家有風致令眼瞼皮肉上下有肉如粟粒相似唯多淚出澀痛如米隱一般積久年深翳膜昏暗漸漸加重此眼切宜三五度鐮洗出血去根本即瘥然後服除風湯退熱飲子詩曰澀痛多淚出真如米隱睛翻看上下瞼粟子只頻生赤白非言定針挑更似冰直須瘀血盡涼藥必能徵除風湯防風二兩犀角大黃知母黃芩黑參各一兩桔梗羚羊角各一兩半上為末以水一盞散一錢煎至五分空心去渣溫服退熱飲子茺蔚子知母大黃茯苓五味子人參芒硝各一兩車前子一兩半上為末以水一盞散一錢煎至五分食後去渣溫服三十九胞肉膠凝外障此眼初患之時皆因脾胃積熱腦內風衝入眼胞瞼有肉初時小如麻米年多漸長大如桃李之狀摩隱瞳人為翳裡邊宜令針出血然後鐮洗瘀血服細辛湯磨翳散效詩曰眼胞皮肉夾膠形漸長如同梅李形針破裡邊膿出後還須服藥使光明或因此患加風熱淚出應當有翳生鈹割理如風毒眼盡磨退散自相應細辛湯細辛人參茯苓車前子五味子黑參防風地骨皮各一兩半上為末以水一盞散一錢煎至五分食後去渣溫服磨翳散龍腦曾青水晶各一兩珍珠末琥珀各一分上搗羅為末令細至夜後點散眼內立效四十漏睛膿出外障此眼初患之時微有頭旋昏悶四體如勞五臟多積風氣壅毒致令瘡出於眼中或流清涎皆是腦無所作雖然不痛漸加昏暗切宜補治服治風黃耆湯即瘥詩曰眼目緣何患滿睛熱和風在瞼中停眥頭結聚為膿汁或流涎水色黏青雖然不痛兼無翳漸攻瘡大豈心寧黃耆象膽丸和散眼安蘆薈作膏蒸若也因緣經歲月烏珠漸落始心驚治風黃耆湯黃耆一兩半防風遠志地骨皮人參茯苓大黃各一兩知母二兩上為末以水一盞散一錢煎至五分去渣溫服四十一蟹睛疼痛外障此眼初患忽然疼痛坐臥不得赤澀淚出怕日羞明皆是肝臟伏熱膈中膽氣不足致令瞳人突出如黑珠子又如桃李相似此是蟹眼睛也急宜服藥不可針灸鉤割尉烙恐損眼也宜服瀉肝湯補膽丸鎮腎決明丸立瘥詩曰忽然豆粒出烏珠蟹眼因茲作號呼此狀必因疼痛極便明損翳最難除鉤膜針鐮皆莫用點諸疼眼敗須臾只宜涼藥兼宜補決明丸散大相宜肝中熱退還消散針灸塗摩總不須瀉肝湯黑參地骨皮車前子芒硝各一兩大黃知母各一兩半茺蔚子二兩上為末以水一盞散一錢煎至五分去渣空心溫溫服之補膽丸防風細辛各一兩半遠志黃芩人參茯苓桔梗芍藥各一兩上為末煉蜜為丸如桐子大空心茶下十丸鎮腎決明丸石決明菟絲子五味子各一兩細辛乾山藥乾地黃知母各一兩半上為末煉蜜為丸如桐子大空心茶下十丸四十二突起睛高外障此眼初患之時皆因疼痛發歇作時蓋是五臟毒風所致令睛突出此疾不宜針灸鉤割只宜服退熱桔梗飲子還睛丸若要平穩用針針破流出青汁即得平復詩曰忽然疼痛便睛高毒風五臟熱相遭冷飲瀉肝令大泄又吞丸散漸須明莫要中歸平穩處針出青涎莫要挑便突更針三五度睛輪平復似元朝退熱桔梗飲子桔梗茺蔚子大黃黑參芍藥防風黃芩芒硝各一兩上為末以水一盞散一錢煎至五分食後去渣溫服還睛丸遠志茺蔚子防風人參乾山藥五味子茯苓細辛各一兩車前子一兩半上為末煉蜜為丸如桐子大空心茶下十丸四十三風牽喎偏外障此眼初患之時皆因腎臟虛勞房事不節脾胃壅毒夜臥多涎肝氣不足致使不覺中風口眼喎斜瞼中赤癢時時顳之牽動宜令火針出淚又針睛明穴若有胬肉即依法鉤割尉烙若無胬肉不宜鉤割只服羚羊角飲子用摩風膏摩之詩曰偏風牽動口斜喎淚出還應不奈何湯飲去除風毒了摩風膏與且摩塗若除胬肉休鉤割有即應當用亦佳承泣睛明須是穴風牽瞼動莫針他羚羊角飲子羚羊角知母人參五味子茯苓各一兩黃耆防風茺蔚子各一兩半上為末以水一盞散一錢煎至五分食後去渣溫服摩風膏木香當歸白芷黑附子細辛藁本防風骨碎補各一兩烏頭芍藥肉桂各兩半豬脂半斤牛酥鵝脂各四兩上為末以麻油半斤浸藥末一宿一日以文武火煎如膏為度四十四倒睫拳毛外障此眼初患之時皆因肝家受熱膈內風虛眼多淚出或癢或疼乍好乍惡以手措摩致令睫毛倒拳刺隱瞳人磣澀睛上白膜遮滿不宜鐮洗出血尉烙切恐眼皮漸小急開合稍難然後宜服細辛散補腎丸立效詩曰若因風赤淚涓涓翳膜潛生碧漸滿乍好乍惡多年後眼皮急小欲開難倒睫拳攣如刺磣摩應瞳人豈可安醫者去毛根永斷太陽針血最為先湯藥入除風與熱鈹鐮數數點朱煎細辛散細辛防風知母茺蔚子各二兩黑參桔梗大黃羚羊角各一兩上為末以水一盞散一錢煎至五分食後去渣溫溫服之補腎丸五味子人參澤瀉乾山藥車前子茯苓細辛黃芩各一兩乾地黃三分上為末煉蜜為丸如桐子大每服十丸空心茶清下四十五風牽瞼出外障此眼初患之時乍好乍惡發歇無時多因淚流不止蓋因胃氣受風肝膈積熱壅毒在瞼皆致使眼皮翻出切宜鐮洗散去瘀血尉烙三五度然後服黃耆湯煎摩風膏摩之瞼內塗白蘞膏即瘥詩曰一般風熱入雙眸此眼緣何患異殊脾臟毒風翻出瞼腎因傳送入為珠若是瞼翻還易療毒風入黑即難除銅篦輕尉摩風藥白蘞為膏瞼內塗黃耆湯黃耆茺蔚子各二兩防風一兩半地骨皮茯苓川大黃人參黃芩各一兩甘草五錢上為末以水一盞散一錢煎至五分食後去渣溫服摩風膏黃耆細辛當歸杏仁各一兩白芷一兩半防風松脂黃蠟各一兩小麻油四兩上搗羅為末煎成膏塗之白蘞膏白蘞白芨白芷各一兩突厥子兩半上為細末用牛酥五兩煎為膏早晨塗在眼睛內夜半塗亦得四十六神祟疼痛外障此眼初患之時舊無根基忽然發動疼痛如錐刺瞼皮亦如火炙此疾不可忍且求神祟氣風服藥補治臟腑不得鉤割尉烙針灸不爾恐生翳障宜服羚羊角飲子點秦皮煎效詩曰舊沒根基忽患生疼痛如針刺不安茲如火炙來相近求他神祟不虛言痛定須還湯藥治莫教風熱更相連不須尉烙並燒炙點去秦皮作散煎羚羊角飲子羚羊角二兩人參茯苓大黃天門冬黑參黃芩車前子各一兩上為末以水一盞散一錢煎至五分食後去渣溫服秦皮煎秦皮黃耆木香黃連黑參各一兩上為末以水一盞浸藥三宿去渣入蜜四兩煎成膏用之四十七旋螺尖起外障此眼初患之時忽然疼痛作時由熱積壅毒留在肝間切宜補治恐損眼也宜服搜風湯瀉肝飲子宣腸立效詩曰眼前生障翳尖起似旋螺治望難依舊根深更奈何時時疼痛發風來未消磨湯藥勤為服宣通肝臟多治求丸散解痛定即從他是療不相應睛高或陷窪搜風湯防風五味子大黃天門冬桔梗芍藥細辛各兩半茺蔚子二兩上為末以水一盞散一錢煎至五分食後去渣溫溫服之瀉肝飲子大黃細辛芒硝車前子黃芩桔梗柴胡知母各一兩上為末以水一盞散一錢煎至五分食後去渣溫溫服之四十八鶻眼凝睛外障此眼初患之時忽然癢痛淚出五臟眼起皆硬難以回轉不辨人物切宜針引血脈以摩風膏摩之此疾皆因五臟熱壅衝上腦中風熱入眼所使宜服瀉肝湯抽風散立效詩曰五輪目硬難回轉鶻眼凝睛是本形欲知根深何處起腦中風熱臟中蒸先將針風引風壅藥壓塗摩血脈行元損只宜從向泄除嗔戒行即平平瀉肝湯防風大黃茺蔚子黃芩黑參桔梗芒硝各一兩上為末以水一盞散一錢煎至五分食後去渣溫溫服之抽風散石決明茯苓車前子五味子人參細辛知母各一兩半上搗羅為末食後米飲湯調下一錢七分四十九轆轤轉關外障此眼初患之時皆因膈中壅毒肝臟熱極風毒入腦致令眼吊起睛瞳難以回轉不辨人物有在胎中患者乃不可治若初患之時急須治療宜服天門冬飲子瀉肝散詩曰上瞼藏中下瞼藏則還不肯定中央轉關恰似轆轤轉聖者留言難改張病即雖云醫不得徒教學者用形彰堪嗟永處幽冥地不識青黃坐久常天門冬飲子天門冬茺蔚子知母各一兩防風五味子各一兩人參羌活茯苓各二兩上為末以水一盞散一錢煎至五分食後去渣溫服瀉肝散天門冬一兩大黃黃芩細辛芒硝各一兩黑參桔梗各一兩半上為末以水一盞散一錢煎至五分食後去渣溫服五十偶被物撞破外障此眼初患之時忽然被物誤有打撞眼胞青珠疼痛惡腫難開宜令鐮洗出血後以爛搗地黃綿裹封眼然後宜服除風散壓熱飲子詩曰非理因遭撞破傷不任疼痛堪乖張瞳人被振全昏濁惡血仍流在眼眶欲療只須鐮瞼血地黃綿裹密封藏除風壓熱涼湯飲免使他風作禍殃除風散防風二兩車前子藁本細辛芎藭五味子桔梗各一兩半上搗羅為末用陳米飲湯空心調下一錢七分壓熱飲子犀角大黃知母人參茯苓黃芩黑參麥門冬各兩半甘草一兩上為末以水一盞散一錢煎至五分食後去渣溫服
