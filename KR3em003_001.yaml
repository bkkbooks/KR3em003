body:
  text: 卷之一龍木總論一審的歌發揮詳夫自古名人無不從學而就功推窮事理盡因事以立文須在理通方當行用若或言詞無據即不足與討論臣從幼歲業此道留心亦乃數世相傳豈敢妄違先哲每逢同道皆言眼疾有七十二般及問其數名迹難言一半今則謹按諸家眼論夙夜搜求敢推眼疾之名果有七十二種據其疾狀患者頗多論録為歌以貽後代又自古諸家之眼各有條章病狀一一不同數目皆書不足或有畫作圖形或有歌其藥性雖則救人為切詳之理未周全遂乃按其古今綴為歌頌名號審的歌矣庶使心念其言眼看疾狀認識既不差錯治療又有所憑將用救人永無傷橫近見庸醫之輩學不從師自出己意亂行針藥或虛則反瀉實則反補或則翳嫩便針瘡痕割烙或即不看血忌觸犯人神或即誤針太深損其榮衛因茲疼痛便致損傷針刀傷觸著五輪湯藥乖於臟腑亦由病家無鑑任信庸醫遂使可瘥之眸永沉昏暗之證忝為人子曷不愍傷故書苦口之辭發揮歌訣義理者也二眼敘論夫眼者五臟之精明一身之至寶如天之有日月其可不保護哉然骨之精為瞳子屬腎筋之精為黑眼屬肝血之精為絡果屬心氣之精為白眼屬肺肉之精為約束屬脾契筋骨血氣之精與脈併為之系繫上屬於腦後出於頂中故六淫外傷五臟內郁飲食房勞遠視悲泣抄寫雕鏤刺繡博奕不避煙塵刺血發汗皆能病目故方內有五輪八廓內外障等各各不同尤當分其所因及臟腑陰陽不可混濫如決其面者為兌眥屬少陽近鼻上為外眥屬太陽下為內眥屬陽明赤脈上下者太陽病從下上者陽明病從外走內者少陽病此三陽病不可混也睛色赤病在心色白病在肺色青病在肝色黑病在腎色黃病在脾色不可名者病在胃中此五臟三陽病不可混也仍敘三因於後三三因證治病者喜怒不節憂思兼併致臟氣不平鬱而生涎隨氣上厥逢腦之虛浸淫眼系蔭注於目輕則昏澀重則障翳眵淚胬肉白膜遮睛皆內所因或數冒風寒不避暑濕邪中於項乘虛循系以入於腦故生外翳翳論中所謂青風緑風紫風黑風赤風白風白翳黃翳等隨八風所中變生諸證皆外所因或嗜欲不節飲食無時生食五辛熱啖炙煿馳騁田獵冒涉煙塵勞動外睛乃喪明之本所謂恣一時之遊佚為百歲之固愆皆不內外因治之各有方四五輪歌眼中赤翳血輪心眼中白翳有小赤脈是血輪主屬心黑睛屬腎水輪深黑睛屬腎為水輪白晴屬肺氣輪應白睛為氣輪屬肺肝應風輪位亦沉肝主風輪在內無形總管肉輪脾臟應肉輪屬脾兩瞼脾應病亦侵兩瞼屬脾瞳人屬膽為淮海光明瑩淨直千金一臟不和攻入眼針醫宜早莫沉吟愚癡初患不將治初問針藥卻生疑求神拜鬼間燒炙痛極狂心枉禱神風熱漸深牢固後昏沉翳膜始求醫假使得痊兼復體服藥名醫日月遲五內障眼法根源歌不疼不癢漸昏濛薄霧輕煙漸漸濃或見蠅飛花亂出或如懸蟢在虛空此般樣狀因何得肝臟停留熱及風大叫大啼驚與怒腦脂流入黑眼中初時一眼先昏暗次第相傳與一同苦口何須陳逆耳只言肝氣不相通此時服藥期銷定將息多乖及沒功日久既應全黑暗特名內障障雙瞳名字隨形分十六龍師聖者會推窮靈藥這回難得效金針一撥日當空強修將息依言説莫遣仍前病覆宗六針內障眼法歌內障由來十六般學醫人子審須看分明一一知形狀不針方可得安然若將針法同圖翳誤損神光取瘥難冷熱先明虛與實調和四體持安然不然氣悶違將息嘔逆勞神翳卻翻咳嗽振頭皆未得多驚先服鎮驚丸若求涼藥銀膏等用意臨時體候看老翳細針粗薄嫩針形不可一般般病虛新産懷娠月下手應知將息難不雨不風兼告日清齋三日在針前安心定意行醫道念佛親姻莫雜喧患者嚮明盤膝坐提師腰帶在心安針者但行賢哲行惻隱之情實善緣有血莫針須住手裹封如舊再開看忽然驚振醫重十服藥三旬見朗然七日解封雖見物花生水動莫他言還睛丸散堅心服百日分明覆舊根七針內障眼敘法歌內障金針針了時醫師言語要深知綿包黑豆如球子眼上安排綿系之頭安枕上須要穩上一作豆仰臥三朝莫厭遲封后忽然微有疼腦風牽動莫他疑或針或烙依經法痛極仍將火尉之擬吐白梅含咽汁吐來仰臥卻從伊起則恐因遭努力雖然希有也須知七朝豉粥溫溫食震著牙關事不宜大小便時須緩緩無令自起與扶持高聲叫喚言多後驚動晴輪見雪飛如此志心三十日漸漸出外認親知狂心莫憶陰陽事夫婦分床百日期一月不須臨面洗針痕溫著痛凝凝五辛酒面周年斷服藥平除病本基八小兒歌小兒不與大人同翳療之源別有宗神氣未全難保惜鈹鐮炙烙哭傷瞳等間痛藥勿令點啼叫勞他病轉濃更若手揉難禁詞因茲睛破永夭終欲求穩便全雙目苦藥煎淋洗避風服藥養肝須見效免教昏暗一生中九合藥矜式凡眼病多因五臟壅熱上衝使然故湯飲之劑不可見火蓋藥性得火則熱投之臟腑恰如揚湯止沸非謂無益又且害之須是淨洗向日如遇陰雨亦當風乾若食前補實等藥或炮或炙一依方法今具於左烏頭附子生用去皮尖熟則用灰火炮裂去皮尖牡蠣生用則去泥熟用鹽泥固濟炭火燒通赤取淨須左顧者諸角先鎊治為細末然後入藥和合寶石亦然大黃古方亦用濕紙裹煨或甑上蒸近世生用當量虛實生熟用之天麥二門冬牡丹巴戟天遠志地骨皮皆去心茯苓去皮芍藥去心補藥用白者瀉藥用赤者當歸去蘆淨洗入補藥則用水洗烈日曬乾入湯飲酒浸十宿羌活黃連藜蘆去根蘆淨洗礬石須於新瓦上或銅器中熬令沸汁盡即止石南剔去葉嫩莖去大枝菟絲子酒浸曝乾火焙亦得用紙條子同碾即為末又用鹽拌碾則易碎但只用酒浸爛而碾為膏卻焙再碾念老鷹聲不輒則易碎杏仁蕤仁濕去皮尖柴胡藁本前胡去苗洗淨桂心陳皮去皮枳殼去瓤麩炒諸花去萼及梗洗淨香附子麩炒舂去毛白殭蠶直者去絲嘴炒防風去叉股者蠍蟲去足翅毒微炒荊芥白芷白芨白蘞不見火蟬蛻洗去土曬乾微炒細辛去葉洗淨乳香尋常用指甲爪燈心草糯米之類同研及水浸乳鉢研之皆費力惟紙裹放壁隙中良久碎即粉碎麝香須著少水研之自然碎極細不必羅也煉蜜法稱蜜十兩水十兩同煎去沫準令水盡取出稀稱得淨蜜十兩則是水耗而蜜在庶不焦損又每蜜一斤只煉得十二兩半或一分是實數若火少火多並用不得凡膏中用蠟皆煬攪調以和藥凡膏中用脂皆先煉去草方可用凡膏中有用雄黃硃砂輩皆別搗細研飛過如面絞膏畢乃投膏中以物疾攪勿使凝強不調凡膏中用水銀須於凝膏中研令消散胡粉亦然若水銀誤傾在地不可收宜以雉尾收之川椒亦嘉凡藥中用蜜先稱藥末兩數若干次稱煉了蜜與藥等分方可搜搜畢更於石臼中搗百數杵視其色理合同為嘉丸藥末須用密絹作羅底銼散藥用竹篩篩過方得藥汁清利十煎藥訣大凡煎藥退熱藥須要清利不可用火太猛火勢蒸炎水數易干須是火勢得中扇之恐灰土泥飛入藥中服之反為害也要當家人監視不可專付婢僕也十一服藥須知凡眼藥率多涼劑必於食後服之或者徒泥其説往往食未下咽藥即入口是致食氣與藥氣衝搏釀積於脾胃之上不謂藥無其效且使脾家受冷旋至虛弱須當食歇片時候胸隔稍寬然後隨意服之尤貴冷熱得所大熱則非肝肺所宜大冷則脾腎停積不化宜自斟酌耳十二點眼藥訣凡點眼之藥多用腦麝之類通入關竅毛孔易至引惹風邪點眼之時宜向密室端坐然後用銅箸點少許藥放入眼內點畢以兩手對按魚尾二穴次閣眼良久候血脈稍定漸漸放開若是夜臥用藥則又不拘此法也或向當風去處或是點罷即開則風邪乘入血脈澀滯難散疾勢愈切切須留意七十二證方論一圓翳內障凡眼初患之時眼前多見蠅飛花發垂蟢薄煙輕霧漸漸加重不痛不癢漸漸失明眼與不患眼相似且不辨人物惟睹三光患者不覺先從一眼先患向後相牽俱損此是腦脂流下肝風上衝玉翳青白瞳人端正陽看則小陰看則大其眼須針然後服藥治用防風散羚羊角飲子詩曰翳中再好是團圓一點油如水上盤陽里看時應自小陰中見則又還寬金針一撥雲飛去朗日舒光五月天不是醫人誇巧妙萬兩黃金永不傳防風散茺蔚子防風桔梗五味子知母各二兩黑參川大黃細辛芒硝車前子黃芩各一兩上搗羅為末以水一盞散一錢煎至五分去渣溫服食後羚羊角飲子羚羊角三兩知母細辛車前子人參黃芩各二兩防風二兩半上搗羅為末以水一盞散一錢煎至五分夜餐後去渣溫食之二冰翳內障此眼初患之時頭旋額角偏痛眼瞼骨疼痛眼內赤澀有花或黑或白或紅皆因肝臟積熱肺受風勞或心煩或嘔血大腸祕澀夜見燈花如蜂飛初患之時宜令針治諸穴脈忌督脈出血過多恐加昏暗宜服還睛丸詩曰冰翳猶如水煉堅陰中陽里一般般傍觀瞳子透表白針下分明豈誑言來往用針三五撥志心服藥必能痊若遇庸醫強撥下瞳人清淨不能觀還睛丸防風茺蔚子車前子知母各二兩人參以下各一兩桔梗黃芩乾地黃細辛五味子二兩半黑參半兩上搗羅為末煉蜜為丸桐子大空心茶下十丸三滑翳內障此眼初患之時不癢不痛先從一眼先患後乃相牽俱損端然漸漸失明皆因腦脂流下肝氣衝上瞳人內有翳如水銀珠子不辨人物宜令金針撥之將息後服補肝湯及石決明丸即瘥詩曰滑翳看時心且專微含黃色白翻翻才開還大速還小有似水銀珠子旋針撥雖然隨手落擬抽針出卻歸源縮針穿破青涎散五月金烏照遠天補肝湯人參茯苓黑參黃芩各一兩防風知母桔梗茺蔚子各二兩上搗羅為末以水一盞散一錢煎至五分食後去渣溫服石決明丸石決明車前子防風知母各一兩茺蔚子五味子細辛人參茯苓黃芩大黃各一兩上搗羅為末煉蜜為丸如桐子大食前茶湯送下一十丸四澀翳內障此眼初患之時朦朧如輕煙薄霧漸漸失明還從一眼先患後乃相牽俱損不睹人物猶辨三光翳如凝脂色瞳人端正狀宜令針金針針之然後服還睛散七寶丸立效詩曰澀翳聚開隨瞼遲陰陽大小亦微微傍觀瞳子凝脂色先哲留言不要疑此障撥時依本法用針三五不還遲牢封七日圖瘡疴將息應當莫自欺還睛散桔梗五味子茺蔚子黑參黃芩各一兩防風知母各二兩車前子細茶各二兩半上搗羅為末以水一盞散一錢煎至五分食後去渣溫服七寶丸龍腦一分人參一兩真珠五錢石決明二兩另搗羅細研琥珀青魚膽熊膽各二兩茺蔚子二兩上搗羅為末煉蜜為丸如桐子大食前茶下十丸五散翳內障此眼初患之時不癢不痛漸漸失明還從一眼先患惟瞳人里有障翳乍青乍白不辨人物猶見三光此眼宜令金針撥之然後宜服還睛散補肝湯主之效詩曰散翳又何為所狀形同酥點爛容儀隨針針了和涎散未得分明自得知封裹安存須善巧莫令患者致狐疑殷勤遣眼還睛散再睹三光百日期忌慎一如傳戒行不須恣意縱貪知深言向説何為切記取冥冥黑暗時還睛散人參茯苓細辛五味子桔梗各一兩車前子防風各二兩上搗羅為末以水一盞散一錢煎至五分夜食後去渣溫服補肝湯細辛防風茺蔚子各一兩五味子桔梗各一兩黑參一兩半上搗羅為末以水一盞散一錢煎至五分空心去渣溫服六浮翳內障此眼初患之時都無癢痛還從一眼先患後乃相牽俱損皆因腦中熱風衝入眼內腦脂流下凝結作翳如銀針之色雖不見人物猶見三光宜用金針撥之然後宜決明散墜翳丸神效詩曰浮翳正觀如透外乍看色白似銀燈陰寬陽小隨開合此則深知是本形辨認既能無錯謬金針撥出近烏睛但依教法施心力免觸凝脂破不明決明散石決明人參茯苓大黃車前子細辛各一兩防風二兩茺蔚子二兩桔梗一兩半上為末每食後米飲湯調下一錢墜翳丸石決明細辛各一兩知母乾地黃防風各一兩兔肝一具炙五味子人參各二兩半上為末煉蜜為丸如桐子大空心茶下十丸七沉翳內障此眼初患之時肝臟勞熱還從一眼先患或見黑花後即相牽俱損腦中熱氣流下猶辨三光宜令金針撥之然後服羚羊角飲子空青丸即瘥詩曰一般四障又名沉隱隱藏形黑未深向日細看方得見自古相傳不是今此障撥時須遠穴觀君莫要短頭針墜翳強過五十息只求牢固莫他心羚羊角飲子羚羊角防風茺蔚子各二兩車前子黑參黃芩各一兩大黃半兩上為末以水一盞散一錢煎至五分空心去渣溫服空青丸空青一銖五味子車前子細辛各一兩防風生地黃知母各一兩石決明一兩另搗細研上為末煉蜜為丸如桐子大空心茶下十丸八橫翳內障一名橫關翳內障此眼初患之時還從一眼先患皆是五臟虛勞風毒衝上腦脂流下令眼失明猶辨三光宜用金針撥之宜服還睛丸七寶散即瘥詩曰雖然希有橫關翳學者韜鈐要得知細睹橫心如劍脊上頭下畔白微微開時先向中心撥隨手還當若霧披往修來何所作一生龍樹願依歸還睛丸人參黑參石決明車前子五味子黃芩各一兩防風細辛乾地黃各二兩上為末煉蜜為丸如桐子大空心茶下十五丸七寶散羚羊角犀角各一兩胡黃連石決明車前子甘草各半兩丹砂一分另研上為末以水一盞散一錢煎至五分食後去渣溫服九偃月翳內障此眼初患之時惟有頭旋額角骨痛亦因肝腎俱勞腦風積熱致使生翳如偃月之狀宜用金針撥之然後宜服通明散墜翳丸立效詩曰腦中一種腦脂凝何得偏稱偃月名一半厚而一半薄醫公不了即疑生欲知巧妙行醫法厚處先宜撥便開丸散還睛宜遣服堅牢百歲得安寧通明散人參防風黃芩各一兩細辛一兩半茯苓半兩茺蔚子二兩上為末水一盞散一錢煎至五分夜食後去渣溫服墜翳丸青羊膽青魚膽鯉魚膽各七個熊膽一分牛膽五錢麝少許石決明一兩上為末麵糊為丸如桐子大空心茶下十丸十棗花翳內障此眼初患之時微有頭旋眼澀漸漸昏暗時時癢痛腦熱有花黃黑不定此狀宜令針治諸穴脈然後宜服還睛散墜翳丸立效詩曰翳中何名是棗花周回鋸齒沒諸他撥時從上輕輕撥狀似流星與落霞細意辨看瞳子內莫留斷腳作攔遮依然不斷還睛藥百歲光陰睹物華還睛散人參茯苓車前子黑參防風茺蔚子知母各二兩黃芩兩半去皮上為末以水一盞散一錢煎至五分去渣溫服墜翳丸方同偃月翳墜翳丸十一白翳黃心內障此眼初患之時肝臟勞熱先從一眼先患以後相牽俱損初覺即須急療先須憑服湯藥丸散將息謹護即宜針刺諸穴脈後更用金針輕撥然後服墜翳散即效詩曰可憐白翳更黃心患者商量誤且針來往用針三五撥不隨針落藥能沉還睛方術須通祕百日如風捲霧陰期約叮嚀須向説試看奇效值千金墜翳散石決明茺蔚子防風各二兩車前子甘菊花人參各三兩上為末食後米飲湯調下一錢十二黑水一作黑花凝翳內障此眼初患之時不痛不癢微有頭旋眼澀見花黃黑不定瞳人微大翳或青白宜用金針撥之然後宜服蘆薈丸通明散立效詩曰黑翳冰結微青色可憐內障無真容陰陽開處雖開裹始覺風疴在膽中須用金針三五撥藥憑蘆薈作神功期程百日叮嚀説玉兔中秋照眼空蘆薈丸蘆薈甘草炙各一分人參牛膽各半兩柏子仁細辛各一兩羚羊角一兩蜜炙上為末煉蜜為丸如桐子大空心茶下十丸通明散柏子仁車前子桔梗各二兩茺蔚子黑參茯苓人參各一兩防風一兩半上為末以水一盞散一錢煎至五分食後去渣溫服十三胎患內障此眼初患之時皆因乳母多有吃食乖違將息失度愛食濕面五辛諸毒丹藥積熱在腹後此令胎中患眼生後五六歲以來不言不笑睹無盼視父母始覺急須服藥調理不宜點諸毒藥燒炙頭面枉害形容直至年長十五以來方始辨眼內翳狀如青白色蓋定瞳人猶辨三光可令金針撥之小兒內障多有不堪療者宜仔細看之方可醫療宜服護睛丸即不損眼也詩曰內障因何及小兒胎中受熱腦脂垂初生不覺三年內流盼還應眼轉遲四五歲時言近看瞳人結白始如迷若能信受醫家語更讀前賢后首詩又詩曰小兒內障未容醫將息難為定不疑父母解留年十八金針一撥若云飛癡心炙烙燒頭面舌舐揩摩黑水虧年幾得醫先損了不堪針撥只堪悲護睛丸木香大黃黃芩黑參各一兩射干細辛各半兩上為末煉蜜為丸如桐子大空心茶下十丸十四五風變內障此眼初患之時頭旋偏痛亦是臟腑虛勞肝風為本或一眼先患或因嘔吐雙暗毒風入眼兼腦熱相侵致令眼目失明初覺即須急療宜服除風湯通明補腎丸立效詩曰烏緑青風及黑黃堪嗟宿世有災殃瞳人顏色如明月問睹三光不見光後有腦脂如結白真如內障色如霜醫人不識將針撥翳落非明目卻傷除風湯羚羊角車前子各二兩芍藥人參茯苓大黃黃芩芒硝各一兩上為末以水一盞散一錢煎至五分食後去渣溫服通明補腎丸車前子石決明桔梗芍藥各一兩細辛二兩大黃一分茺蔚子乾地黃各二兩上為末煉蜜為丸如桐子大空心茶下十丸
