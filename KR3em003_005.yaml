body:
  text: 卷之五五十一撞刺生翳外障此眼初患之時因被物撞刺著治療不盡有餘痕積血在瞼眥之中致使生翳如此病狀不宜鉤割尉烙切須將息大忌淫欲嗔怒宜服人參湯退熱茺蔚子散詩曰若有撞刺翳生根治療不盡有餘痕待他疼定瘡徒治勸君將息忌淫嗔覺熱便須將藥壓莫使增加風熱侵若然此翳鉤除得知君不是解醫人人參湯人參二兩茯苓黃芩五味子黑參羌活細辛各一兩車前子一兩半上為末以水一盞散一錢煎至五分食後去渣溫服退熱茺蔚子散茺蔚子二兩防風芎藭桔梗人參知母各一兩藁本五分白芷三分上搗羅為末每日米湯調下一錢五十二血灌瞳人外障此眼初患之時忽被物誤刺著針或炙之失度致令一眼先患後乃相牽俱損蓋為疼痛難忍臥時好眼安著枕上便流毒血在好眼中致使損傷先宜服止疼沒藥散後服墜翳明目丸點摩挲石散立效詩曰眼因射刺五輪虧疼痛眶中若受錐好眼臥將安著枕便流惡血隔光輝可憐清淨無瑕翳沉沒明珠甚可危須用摩挲為點藥卻教惡血本鄉歸止疼沒藥散沒藥二兩麒麟竭一兩大黃一兩半芒硝一兩半上搗羅為末令細食後熱茶調下一錢墜翳明目丸石決明芎藭知母乾山藥五味子各一兩細辛人參各一兩半上搗羅為末煉蜜為丸如桐子大空心茶下十丸摩挲石散摩挲石少許曾青龍腦石膽各一分上搗羅為末令細早晨夜後點眼立效五十三眯目飛塵外障此眼初患之時皆因風吹塵物入眼貼瞼皮黏定睛上疼痛隱澀難開不辨人物欲治之時須翻眼皮用綿裹針撥出眯物宜服藥將息忌口若有翳膜急服退翳車前散補肝丸詩曰眯目諸般物飛揚並濺來貼睛黏定後疼痛隱難開綿裹針療出尋清自暢懷因茲生翳膜好藥卻能回車前散車前子五味子芍藥各一兩半細辛黑參茯苓人參大黃桔梗各一兩上為末以水一盞散一錢煎至五分食後去渣溫服補肝丸澤瀉菖蒲各一兩半人參茯苓乾山藥遠志防風知母乾地黃各二兩上為末煉蜜為丸如桐子大空心茶下十丸五十四天行後赤眼外障此眼初患之時忽然赤腫淚出若有患者或輕或重還從一眼先患後乃相牽俱損切宜鐮洗去瘀血後宜服瀉肝散用洗眼湯點龍腦煎即效詩曰忽然赤疼腫相併天行赤眼是為名厲竹熱氣相傳染體性隨人有重輕瀉肝湯飲應須服瞼中鐮血更星星秦皮湯洗吞丸藥不瘥經年玉翳生忌毒也須將息治不須鉤烙恐傷睛若將痛藥強為點損敗神光實可驚醫療之門何最穩多餐涼藥得平平翳膜得消散善散之自見徵瀉肝散知母黃芩桔梗各一兩半大黃黑參羌活細辛茺蔚子各一兩上為末以水一盞散一錢煎至五分食後去渣溫服之洗眼湯秦皮甘草細辛黃芩各一兩防風一兩半上搗羅為末以水一盞散三錢煎至一盞半熱洗一日兩度用之立效龍腦煎龍腦一分秦皮防風細辛甘草宣黃連各一兩半上搗羅為末以水一大碗浸藥末三日三夜用銀銚子煎至七分以束綿濾去渣又入蜜四兩煎至五七沸入瓷瓶子內盛勿令泄氣每用點眼立效五十五暴赤眼後急生翳外障此眼初患之時忽然白睛赤腫淚出或癢或痛皆是肝心壅毒在胸膈之間更相擊發藏氣上衝致使如此切宜鐮洗出血後飲蘆根飲子鎮肝丸立效詩曰忽然暴患白睛紅輕者無妨重者疼定是肝心二臟熱更須擊發莫相攻蘆根飲子須通泄莫遣他時更復縱丸散鎮肝吞半劑如斯治療有神功蘆根飲子蘆根大黃防風黃耆芒硝各一兩黃芩黑參各一兩半上搗羅為末以水一盞散一錢煎至五分食後去渣溫服鎮肝丸羌活石決明各二兩藁本一兩半乾山藥細辛五味子茯苓車前子人參各一兩上搗羅為末煉蜜為丸如桐子大空心茶下十丸五十六胎風赤爛外障此眼初患之時皆因生後乳母多食濕面酒醋壅毒之物致令小兒雙目盡赤眵掩四眥赤爛號曰胎風後長成十五以來切宜鐮洗出血服黃耆飲子點蕤仁膏即瘥詩曰襁褓雙眸眥盡紅醫人欲識號胎風嬰兒乳母吞諸熱潛入初於五臟中癢發手揉能禁制外風因便得侵沖良醫先用通丸散次用蕤仁眶內攻服藥臨時隨冷熱鈹鐮瘀血斷根蹤不然久後為何狀倒睫拳毛一世中黃耆飲子黃耆三兩車前子細辛黃芩五味子各一兩防風一兩半上搗為末以水一盞散一錢煎至五分食後去渣溫服蕤仁膏蕤仁五錢石膽黃蠟小麻油膩粉各少許上搗研令細如粉為妙後入油蠟子瓷碗內慢火煎成膏點眼五十七風赤瘡痍外障此眼初患之時或即癢痛作時發歇不定或出多淚遂合瞼肉瘡出四眥如硃砂色相似然後漸生膜翳障閉瞳仁蓋是脾臟毒風即熱膈中致令眼病不宜點藥炙著頭面恐傷眼也宜服瀉肝湯墜膈丸立效詩曰風赤生於脾臟家瘡生面瞼似硃砂烏珠潔淨未為事兩年還有翳來遮輕翳點除權得瘥欲飲鉤鐮知者誇若把炙燒來退卻欲除根本路程賒瀉肝湯人參黃芩茯苓大黃桔梗芒硝各一兩茺蔚子二兩黑參一兩半上為末以水一盞散一錢煎至五分食後去渣溫溫服之墜膈丸五味子乾山藥知母澤瀉車前子石決明各一兩防風一兩半上為末煉蜜為丸如桐子大空心茶下十丸五十八衝風淚出外障此眼初患之時蓋因毒風入眼遂乃淚出拭卻還生冬月即多夏月即少後至三五年間不分冬夏皆有淚出此疾蓋謂淚膛通肺臟中久後便令眼目轉加昏暗難辨物色如此疾狀宜服細辛丸暖肺湯以銅箸燒烙睛明穴點點眼止淚散乃得痊效詩曰風沖淚出血還流每到三冬法不休傾側淚膛通肺臟細辛丸散斷根除雄黃五味迎風點銅箸炙燒烙眥頭早早勸君醫治卻他時免得一生憂細辛丸細辛二兩五味子熟乾地黃各一兩半人參茯苓地骨皮山芋防風各一兩上為末煉蜜丸如梧桐子大空心鹽湯下二十丸日再暖肺湯茺蔚子細辛五味子乾地黃各一兩半藁本一兩半知母黃芩芎藭各一兩上為末以水一盞散一錢煎至五分食後去渣溫服點眼止淚散雄黃五錢曾青一兩龍腦白礬灰細辛乾薑灰各等分上搗羅為末令十分細如粉面每至夜後點在眼內立效五十九暴風客熱外障此眼初患之時忽然白睛脹起都覆烏睛和瞳人或癢或痛淚出難開此是暴風客熱久在肺臟上衝肝膈致令眼內浮脹白睛不辨人物此疾宜服瀉肺湯補肝散鈹鐮出血後點抽風散即瘥詩曰白睛脹起蓋烏睛瞼腫還應癢痛生此是暴風兼客熱來侵肺臟不安寧瀉湯之內加風藥丸散臨時得妙名鈹鐮瘀血應須盡抽風膏藥眼中烹瀉肺湯羌活黃芩黑參各一兩桔梗大黃芒硝地骨皮各一兩上為末以水一盞散一錢煎至五分食後去渣溫服補肝散藁本二兩白芷車前子石決明各一兩半芍藥天麻防風細辛各一兩上為末每日空心米湯調下一錢抽風散黃柏秦皮秦艽防風細辛各一兩黃連木香各五錢上為末以水一盞浸一宿去渣入龍腦少許蜜四兩同煎為膏點眼六十瞼硬睛痛外障此眼初患之時胞瞼赤脹腫硬難開淚出疼痛還從一眼先患後乃相牽俱損漸生翳膜昏暗皆是膈中積肝臟風毒上衝入眼宜令鐮洗去瘀血後服瀉肝散熁腫膏宜謹諸事詩曰瞼中紅腫睛痠疼肝膈風來熱生沖腮腫塗膏兼服藥輕輕鐮洗斷其蹤無令發歇生浮翳此後尋醫枉費工省謹若能三五日人間諸事卻通容瀉肝散大黃知母芒硝車前子茺蔚子黃芩天冬各一兩黑參一兩半上為末以水一盞散一錢煎至五分食後去渣溫服熁腫膏代赭石黃蠟各半兩細磁末麻油一兩膩粉少許黃柏一兩上為末於銚子內入油蠟同煎為膏塗瞼上六十一眼痛如針刺外障此眼初患之時微有頭痛目眩眼系常急夜臥澀痛淚出難開時時如針刺外障相似是心臟伏毒熱氣壅在膈中以後漸生障翳遮滿相牽如此疾狀宜服瀉心湯後服補肝散兼鐮洗出血火針太陽穴立效詩曰忽然睛內痛如針熱毒潛藏伏在心逐使雙眸兼系急日眴急則痛侵侵太陽陽白將針刺湯飲宣通宜洗淋隱澀難開由瞼內鈹鐮出血即能禁瀉心湯大黃黃芩桔梗知母各一兩馬兜鈴黑參各一兩半防風二兩上為末以水一盞散一錢煎至五分食後去渣溫服補肝散人參茯苓五味子芎藭藁本各一兩茺蔚子細辛各一兩半上為末每日空心米湯調下一錢六十二眼癢極難忍外障此眼初患之時忽然癢極難忍此乃肝臟有風膽家壅熱衝上所使切宜鐮洗出瘀血火針針陽白太陽二穴後服烏蛇湯還睛散馬兜鈴丸即瘥詩曰時時睛癢極難忍此病根由誰與尋瞳子氣連清淨府遭他風熱上來侵也須陽白將針刺湯用烏蛇病自輕此日不忘丸與散教君去卻病根深烏蛇湯烏蛇藁本防風芍藥羌活各一兩芎藭細辛各半兩上為末每日食後米湯調下一錢還睛散防風車前子黑參石決明五味子細辛各一兩知母五錢上為末每日食後米湯調下一錢馬兜鈴丸馬兜鈴柴胡茯苓各一兩半黑參桔梗細辛各一兩上為末煉蜜為丸如桐子大每日空心茶下十丸
