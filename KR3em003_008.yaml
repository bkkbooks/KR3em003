body:
  text: 卷之八針灸經一偃伏頭部中行凡十穴神庭一穴在鼻直入髮際五分督脈足太陽陽明三脈之會治頭風目眩鼻出清涕不止目淚出可灸二七壯止岐伯曰凡欲療風勿令灸多緣風性輕多即傷宜灸七壯至三七壯止禁不可針針即發狂忌生冷雞豬酒面動風物等上星一穴在鼻直上入髮際一寸陷中督脈氣所發治頭風目眩睛痛不能遠視以細三稜針刺之即宣泄諸陽熱氣無令上衝頭目可灸七壯不宜多灸若頻灸即拔氣上令目不明忌如前法囟會一穴在上星後一寸陷中可容豆督脈氣所發治目眩可灸二七壯至七七壯初灸即不痛病去即痛痛則罷灸針入二分留三呼得氣即瀉針訖以末鹽生麻油相和揩髮根下頭風即永除若八歲以下即不得針忌如前法前頂一穴在囟會後一寸五分骨陷中督脈氣所發療頭風目眩針入一分可灸三壯至七七壯即止忌如前法百會一穴一名三陽五會在前頂後一寸五分頂中央旋毛中可容豆督脈足太陽交會於巔上針入二分得氣即瀉可灸七壯至七七壯即止唐秦鳴鶴刺微出血頭痛立愈凡灸頭頂不得過七七壯緣頭頂皮膚淺薄灸不宜多後頂一穴一名交沖在百會後一寸五分枕骨上督脈氣所發治目眩頭偏痛可灸五壯針入三分強間一穴一名大羽在後頂後一寸五分督脈氣所發治腦旋目暈頭痛不可忍可灸七壯針入二分腦戶一穴一名合顱在枕骨上強間後一寸五分督脈足太陽之會禁不可針針之令人啞不能言治目晴痛不能遠視可灸七壯亦不可妄灸令人失喑風府一穴一名舌本在項髮際上一寸大筋內宛宛中疾言其肉立起言休立下督脈陽維之會禁不可灸不幸使人失喑治頭痛目眩針入三分啞門一穴一作喑一名舌橫一名舌厭在頂中央入髮際五分宛宛中督脈陽維之會入系舌本仰頭取之禁不可灸灸之令人啞治頭痛針入二分一作五分二偃伏頭部第二行左右凡十四穴曲差二穴在神庭旁一寸五分入髮際足太陽脈氣新發治頭頂痛目視不明針入二分可灸三壯五處二穴在上星旁一寸五分足太陽脈氣所發治目不明頭風目眩針入三分留七呼可灸三壯承光二穴在五處後一寸五分足太陽脈氣所發治風眩頭痛目生白膜針入三分禁不可灸通天二穴在承光後一寸五分足太陽脈氣所發治偏風鼻多清涕衄血頭重針入三分留七呼可灸三壯絡卻二穴一名強陽又名腦蓋在通天後一寸五分足太陽脈氣所發治青風內障目無所見可灸三壯玉枕二穴在絡卻後一寸五分俠腦戶旁一寸三分起肉枕骨入髮際上三寸足太陽脈氣所發治目痛不能視腦風疼痛不可忍者可灸三壯天柱二穴俠項後髮際大筋外廉陷中足太陽脈氣所發治目瞑視頭旋腦痛針入五分得氣即瀉立愈三偃伏頭部第三行左右凡十二穴臨泣二穴在目上直入髮際五分陷中足太陽少陽之會治目生白翳多淚針入三分留七呼得氣即瀉忌如前法目窗二穴在臨泣後一寸足少陽陽維之會治目外眥赤痛忽頭旋目䀮䀮遠視不明針入三分可灸五壯三度刺目大明正營二穴在目窗後一寸足少陽陽維之會治頭項偏痛針入三分可灸五壯承靈二穴在正營後一寸五分足少陽陽維之會治腦風頭痛可灸三壯腦空二穴一名顳顬在承靈後一寸五分挾玉枕骨下陷中足少陽陽維之會治腦風頭痛不可忍目瞑針入五分得氣即瀉可灸三壯魏公苦患頭風發即心悶亂目眩華佗當針而立愈忌如前法風池二穴在顳顬後髮際陷中足少陽陽維之會治目眩苦頭痛目淚出目內眥赤疼目不明針入七分留七呼可灸七壯四側頭部左右凡十二穴頷厭二穴在曲周下顳顬上廉手足少陽陽明之交會治頭風眩目無所見偏頭痛引目外眥急針入七分留七呼可灸三壯忌如前法懸顱二穴在曲周上顳顬中廉足少陽脈氣所發治頭偏痛引目外眥赤針入三分留三呼可灸三壯忌如前法懸釐二穴在曲周上顳顬下廉手足少陽陽明之交會治頭偏痛目銳眥赤痛針入三分灸三壯角孫二穴在耳郭中間上開口有空手足少陽之會治目生膚翳可灸三壯竅陰二穴在枕骨下搖動有空足太陽少陽之會治頭目痛針入三分可灸七壯瘈脈二穴一名資脈在耳本後雞足青絡脈刺出血如豆汁不宜出血多治頭風眵蒙目睛不明針入一分可灸三壯五正面部中行凡一穴齦交穴左唇內齒上齦縫筋中治目淚眵汁內眥赤癢痛生白膚翳針入三分可灸三壯六面部第二行左右六穴攢竹二穴一名始光一名光明一名員柱在兩眉頭陷中足太陽脈氣所發治目䀮䀮視物不明眼中赤痛針入一分留三呼瀉三吸徐徐而出針不宜灸宜以細三稜針刺之宣泄熱氣三度刺目大明忌如前法睛明二穴一名淚孔在目內眥手足太陽少陽足陽明五脈之會治攀睛翳膜覆瞳子惡風淚出目內眥癢痛小兒雀目疳眼大人氣眼冷淚𥌰目視物不明大眥胬肉侵睛針入一寸五分留三呼禁不可灸雀目者宜可久留針然後速出針忌如前法巨髎二穴俠鼻孔旁八分直目瞳子蹺脈足陽明之會治青盲目無所見遠視䀮䀮白翳覆瞳子面針入三分得氣而瀉灸亦良可灸七壯七面部第三行左右凡六穴陽白二穴在眉上一寸直目瞳子足少陽陽維之會治頭目痛目眵可灸三壯針入三分一作二分承泣二穴在目下七分直目瞳子陷中蹺脈任脈足陽明之會治目視䀮䀮冷淚眼眥赤痛禁不宜針針之令人目烏色可灸三壯炷如大麥忌如常法四白二穴在目下一寸足陽明脈氣所發治頭痛目眩眼生白翳可灸七壯針入三分凡用針穩審方得下針若針深即令人目烏色八面部第四行左右凡八穴本神二穴在曲差旁一寸五分一日直耳上入髮際四分足少陽陽維之會治目眩頸項強急痛針入三分可灸三壯絲竹空二穴一名目髎在眉後陷中足少陽脈氣所發禁不可灸不幸使人目小又令人目無所見治目眩頭痛目赤視物眩眩眼睫拳倒針入三分留三呼宜瀉不宜補瞳子髎二穴在目外眥五分手太陽手足少陽之會治青盲無所見遠視䀮䀮目中膚翳白膜頭痛目外眥赤痛可灸三壯針入三分顴髎二穴在面頄骨下廉銳骨端陷中手少陽太陽之會治目黃眼瞤動不止針入二分九側面部左右凡二穴頭維二穴在額角入髮際本神旁一寸五分足少陽陽明脈之交會治頭偏痛目視物不明針入三分禁不可灸十背腧部中行凡二穴陶道一穴在大椎節下間俯而取之督脈足太陽之會治頭重目瞑可灸五壯針入五分筋縮一穴在第九椎節下間俯而取之督脈氣所發治目轉上垂可灸三壯針入五分十一背腧部第二行左右凡十穴風門二穴一名熱府在第二椎下兩旁相去各一寸五分督脈足太陽之會治目瞑風勞針入五分留七呼可灸五壯肺腧二穴在第三椎下兩傍相去各一寸五分足太陽脈氣所發甄權針經云在第三椎下兩旁以搭手左取右右取左當中指末是穴治頭目眩針入五分留七呼可灸一百壯肝腧二穴在第九椎下兩旁相去各一寸五分治目上視目眩頭痛目䀮䀮生白翳針入三分留六呼可灸三壯三焦腧二穴在第十三椎下兩旁相去各一寸五分治目眩頭痛針入五分留七呼可灸三壯腎腧二穴在十四椎下兩旁相去各一寸五分與臍平治目視䀮䀮五勞七傷針入三分留七呼可灸以年為壯慎如前法十二背腧部第三行凡二穴譩譆二穴在肩髆內廉俠六椎下兩旁相去各三寸正坐取之足太陽脈氣所發以手痛按之病者言譩譆針入六分留三呼瀉五吸治目眩鼻衄可灸二七壯至百壯止忌莧菜白酒等物十三手太陰肺經左右凡四穴大淵二穴土也在手掌後陷中手太陰脈之所注也為腧治目生白翳眼眥赤筋可灸三壯針入二分天府二穴在腋下三寸動脈中以鼻取之治目眩遠視䀮䀮禁不得灸針入四分留三呼十四手陽明大腸經左右凡四穴商陽二穴金也一名絕陽在手大指次指內側去爪甲角如韭葉手陽明脈之所出也為井治目青盲可灸三壯右取左左取右如食頃立已針入一分留一呼合谷二穴一名虎口在手大指次指歧骨間陷中手陽明脈之所過也為原治目視不明頭痛針入三分留六呼可灸三壯若婦人妊娠不可刺之損胎氣十五手少陰心經左右凡四穴通里二穴在腕後一寸治目眩頭痛針入三分灸三壯少海二穴水也一名曲節在肘內廉節後又云肘內大骨外去肘端五分手少陰脈之所入也為合治目眩甄權云屈手向頭取之治腦風頭痛不宜灸針入五分十六手太陽小腸經左右凡十四穴少澤二穴金也一名小吉在手小指之端去爪甲下一分陷中手太陽脈之所出也為井治目生膚翳覆瞳子可灸一壯針入一分前谷二穴水也在手小指外側本節之前陷中手太陽脈之所流也為滎治目中白翳可灸一壯針入一分後谿二穴木也在小手指外側本節後陷中手太陽脈之所注也為腧治目赤生翳可灸一壯針入一分腕骨二穴在手外側腕前起骨下陷中手太陽脈之所過也為原治目冷淚生翳膜頭痛可灸三壯針入二分留三呼陽谷二穴火也在手外側腕中銳骨之下陷中手太陽脈之所行也為經治目眩可灸三壯針入二分留二呼養老二穴在手踝骨上一空腕後一寸陷中手太陽郄治目視不明可灸三壯針入三分支正二穴在腕後五寸別走少陰治頭痛目眩可灸三壯針入三分十七手少陽三焦經左右凡六穴關衝二穴金也在手小指次指之端去爪甲角如韭葉手少陽脈之所出也為井治目生翳膜視物不明針入一分可灸一壯忌慎如前液門二穴水也在手小指次指間陷中手少陽脈之所流也為滎治目眩頭痛目赤澀針入二分可灸三壯中渚二穴木也在手小指次指本節後間陷中手少陽脈之所注也為腧治目眩頭痛目生翳膜針入一分可灸三壯十八足少陽膽經左右凡四穴俠谿二穴水也在足小指次指歧骨間本節前陷中足少陽脈之所流也為滎治目外眥赤目眩可灸三壯針入三分丘墟二穴在足外踝下如前陷中去俠谿四寸五分足少陽脈之所過也為原治目生翳膜可灸三壯針入五分留七呼十九足太陽膀胱經左右凡八穴至陰二穴金也在足小指外側去爪甲角如韭葉足太陽脈之所出也為井治目生翳針入二分可灸三壯通谷二穴水也在足小指外側本節前陷中足太陽脈之所流也為滎治目眩頸項痛目䀮䀮可灸三壯針入三分束骨二穴木也在足小指本節後陷中足太陽脈之所注也為腧治目眩項不可回顧目內眥赤爛可灸三壯針入三分京骨二穴在足外側大骨下赤白肉際陷中足太陽脈之所過也為原治目內眥赤爛目眩針入三分可灸七壯二十推人神所在法一日足大指二日外踝三日股內四日腰五日口舌懸壅六日手掌七日內踝八日足腕九日尻十日腰背十一日鼻柱十二日髮際十三日牙齒十四日胃脘十五日遍身十六日胸前十七日氣衝十八日股內十九日足膝二十日內踝二十一日手小指二十二日外踝二十三日肝腧二十四日手陽明兩腰二十五日足陽明二十六日胸二十七日膝二十八日陰二十九日膝脛顳顬三十日關元下至足以上人神所在之日禁忌針灸若遇疾急不拘二十一推逐時人神所在子時在踝丑時在腰寅時在目卯時在面辰時在頭巳時在手午時在胸未時在腹申時在心酉時在背戌時在項亥時在股二十二推九宮尻神訣一坤踝上艾休加二震須當在齒牙三巽乳頭連口舌四中肩井是尻家五干背面連雙耳六兌手膊莫虛華七艮項腰莫針灸八離肋膝最疑他九坎肘肚腳休犯記取尻神切莫差
