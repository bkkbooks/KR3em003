body:
  text: 卷之九諸方辨論藥性一玉石部凡二十五種雄黃味苦甘平寒大溫有毒治目痛礬石味鹹寒無毒主目痛一外臺祕要治目翳及胬肉取礬石最白者內一黍米大於翳上及胬肉上即令淚出綿拭之令惡汁出盡其疾日日減翳自消薄便瘥礬石須真好者方可用肘後方治目中風腫赤眼方白礬二錢熬和棗丸如彈丸大以摩上下食頃止日三度二姚合衆方治小兒目晴上白膜白礬一分以水四合熟銅器中煎取半合下少白礬調之以綿濾過每日三度點一芥子大芒硝味苦辛大寒孫真入食忌治眼有翳取芒硝一大兩置銅器中急火上煉之放冷後以生絹細羅點眼角中每夜欲臥時一度點妙馬牙硝味甘大寒無毒點眼藥中多用甚去赤腫障翳澀淚痛經驗方退翳明目白龍散取馬牙硝洗淨者用厚紙裹令按實安在懷內著肉處養一百二十日取出研如粉入少龍腦同研細不計年數深遠眼內生翳膜漸漸昏暗遠視不明但瞳人不破並醫得每點用藥末兩米許點目中滑石味甘寒大寒無毒石膽味酸辛寒有毒主明目目痛空青味甘酸寒大寒無毒主青盲明目益肝氣療目赤腫去膚翳止淚唐本空青為眼藥之要日華子空青大者如雞子小者如相思子其青厚如荔枝殼內有漿酸甜能點多年青盲內障翳膜其殼又可摩翳也千金方治眼䀮䀮不明以空青少許漬露一宿以水點之曾青味酸小寒無毒主目痛止淚療頭風腦中寒摩娑石主頭痛丹砂味甘微寒無毒主益氣明目鹽花味鹹溫無毒陳藏器明目去皮膚風毒日華子明目止風淚邪氣範汪方主目中淚出不得開即刺痛以鹽如大目許內目中習習去鹽以冷水數洗目瘥藥性論空心漱齒少許時吐水中洗眼可夜見小字食忌主眯眼者以少鹽並豉置水中視之立出水銀味辛寒有毒硃砂陳藏器云水銀出於硃砂則知二物其味同也妊婦不可服石膏味辛甘微寒大寒無毒主中風日華子云治頭風銀屑味辛平有毒明目膩粉即輕粉也又名水銀粉味辛冷無毒磁石味辛鹹寒無毒日華子治眼昏珊瑚味甘平無毒去目中翳錢相公篋中方治七八歲小兒眼有麩翳未堅不可妄敷藥宜點珊瑚散細研如粉每日少點之三日愈瑪瑙味辛寒無毒主目赤爛硇砂味鹹苦辛有毒妊婦不可服石蟹主青盲目淫膚翳細研水飛過入諸翳相佐用之點目良代赭石味苦甘寒無毒主賊風妊婦不可服古文錢治翳障明目療風赤眼鹽酒浸用戎鹽治眼赤眥爛風赤細研和水點目中井泉石很大黃梔子治眼瞼腫得石決明菊花療小兒眼疳生翳膜二草部凡五十六種菖蒲味辛溫無毒明耳目藥性論治頭風淚下一寸九節者良千金方甲子日取菖蒲一寸九節者陰乾百日為末服方寸匕日三服耳目聰明不忘菊花味苦甘平無毒主頭風眩腫痛目欲脫淚出日華子云菊有兩種花大氣香莖紫者為甘菊花小氣烈莖青小者名野菊味苦甘者入藥苦者不任治四肢遊風頭痛作枕用之可明目葉亦可明目也食療甘菊平其葉正月採可作羹莖五月五日採花九月九日採並主頭風目眩淚出食醫心鏡甘菊主頭風目眩淚出可切作羹煮粥生食亦得人參味甘溫微寒無毒主除邪氣明目通血脈天門冬味苦甘平大寒無毒主諸暴風濕保定肺氣甘草味甘平無毒通經脈利血氣解百藥毒術味苦甘溫無毒主風眩頭痛目淚出聖惠方治雀目不計時月用蒼朮二兩搗為細末每服一錢不計時候以好羊子肝一個用竹刀子批開攤藥在內麻繩纏定以粟米泔一大盞煮熟為度患人先熏眼藥氣絶即吃之簡要濟衆亦治小兒雀目經驗方蒼朮不拘多少用米泔水浸三兩日逐日換水候滿日取出刮去黑皮切作片曝乾用慢火炒令黃色細搗末每一斤末用蒸過茯苓半斤煉蜜為丸如桐子大空心臥時溫熟水下十五丸別用術末六兩甘草末六兩拌合勻作湯點之可壯顏色明耳目忌桃李蛤雀三日又治內外障眼蒼朮四兩米泔浸七日逐日換水後刮去黑皮細切入青鹽一兩同炒黃色為度去鹽不用木賊二兩以童子小便浸一宿水淘焙乾同搗為末每日不計時候但飲食蔬菜內調下一錢七分甚妙菟絲子味辛甘無毒久服目明茺蔚子味辛甘微溫微寒無毒主明目療頭痛柴胡味苦平微寒無毒去腸胃中結氣久服輕身明目麥門冬味甘微寒無毒主目黃陳藏器和車前子乾地黃為丸服之明目夜中見光羌活味苦甘平微溫無毒療諸賊風百節痛風又日華子治一切風旋眼目赤痛獨活即羌活母類也車前子味甘鹹寒無毒主養肺明目療赤痛藥性論能去肝中風熱毒風沖眼目赤腫障翳腦痛淚出聖惠方治久患內障眼車前子乾地黃麥門冬等分為末蜜丸如桐子大服之屢有效木香味辛溫無毒薯蕷味甘溫平無毒主頭面遊風頭風眼眩久服耳目聰明澤瀉味甘鹹寒無毒主風扁鵲云多服病人眼遠志味苦溫無毒主耳目聰明去心下膈氣皮膚中熱面目黃草龍膽味苦寒大寒無毒益肝膽氣日華子云明目細辛味辛溫無毒主頭痛腦動益肝膽通精氣久服明目陶隱居云最能除痰明目也巴戟天味辛甘微溫無毒增志益氣療頭面遊風芎藭味辛溫無毒主中風入腦頭痛除腦中冷目淚出多涕御藥院方真宗賜高祖相國去痰清目生犀丸川芎十兩緊小者粟米泔浸三日薄切片子日乾為末作兩料入料入腦麝各一分生犀半兩重湯煮蜜杵為丸小彈子大茶酒任嚼下一丸頭目昏眩加細辛一分口眼喎斜炮天南星一分黃連味苦寒微寒無毒主熱氣目痛眥傷淚出明目益膽又治目方用黃連多矣而羊肝丸尤奇異取黃連末一大兩白羊子肝一具去膜同於砂盆內研令極細衆手捻為丸如桐子大每食以暖漿水吞二七枚連作五劑瘥但是諸眼目疾及障翳青盲皆主之禁食豬肉及冷水劉禹錫云有崔承元者因官治一死罪囚出活之囚後數年亦病死一日崔為因內障所苦喪明逾年後因半夜嘆息獨坐時聞階除間窸窣之聲崔問為誰曰是昔所蒙活者囚今故報恩至此遂以此方見告訖而沒崔依此合服不數月眼復明因傳此方於世又今醫家洗眼湯以當歸芍藥黃連等分銼細以雪水或甜水煮濃汁乘熱洗冷即再溫洗甚益眼目是風毒赤目花翳皆可用之其説曰凡眼目之病皆血脈凝滯使然故以行血藥合黃連治之血得熱即行故乘熱洗之用者無不神效外臺祕要治目卒癢痛末黃連以乳汁浸點目中抱朴子乳汁煎黃連治目中百病肘後方治眼淚出不止濃煎黃連汁浸綿拭之蒺藜子味苦辛微溫寒無毒主風癢頭疼咳逆傷肺肺痿其葉主風癢可煮以浴久服明目古蒺藜子皆用刺者治風最良外臺祕要補肝散治三十年失明蒺藜子七月七日收陰乾搗散食白水服方寸匕黃耆味甘微溫無毒主安痛補虛日華子治頭風熱毒赤目等藥中有益呼為羊肉肉蓯蓉味甘酸鹹微溫有毒主補中防風味甘辛無毒主頭眩痛惡風風邪目盲無所見日華子治風赤眼止淚決明子味鹹苦甘平微寒無毒主青盲目淫膚赤白膜眼赤痛淚出唐本主明目故以決明名之俗方惟以療眼也日華子治肝氣脅太陽穴治頭痛作枕勝黑豆治頭風明目食療葉主明目利五臟食之甚良子主肝家熱毒氣風眼赤淚每日服一匙挼去塵空心水吞之百日後夜見光物也外臺祕要治積年失明不識人決明子二升杵散食後以粥飲方寸匕千金方治肝毒熱取決明子作菜食之五味子味酸溫無毒日華子治風明目地膚子味苦寒無毒去皮膚中熱氣久服耳目聰明外臺祕要治目痛及眯目忽中傷因有熱瞑者取地膚子白汁注目中乾薑味辛溫大熱無毒逐風邪唐本久服令眼暗肘後方治身體重小腹急熱必沖胸膈頭重不能舉眼中生翳乾薑四兩末溫和溫服覆取汗得解集驗方治頭旋眼眩乾薑為末熱酒調半錢立效當歸味甘辛溫寒無毒日華子治一切風芍藥味苦酸平微寒有小毒通順血脈藥性論能治肺邪氣日華子治頭風痛明目赤胬肉赤色者別本注赤者利小便下氣白者止痛散血瞿麥味苦辛寒無毒明目去翳孕婦不可食日華子云治眼目赤腫痛玄參味苦鹹微寒無毒補腎氣令人目明秦艽味苦辛平微溫無毒療風無問久近知母味苦寒無毒療膈中惡及風汗多服令人瀉日華子潤心肺補不足虛勞貝母味辛苦平微寒無毒主目眩項直藥性論末之點眼去膚翳白芷味辛溫無毒主頭風侵目淚出頭眩目癢藥性論除風邪明目止淚日華子治目赤胬肉百一選方都梁丸王定國因被風吹項背拘急頭目昏眩太陽並腦俱痛自山陽拿舟至泗州求醫楊吉老既診脈即與藥一彈丸便服王因款話經一時再作並進兩服病若失王甚喜問為何藥答曰公如道得其中一味即傳此方王思索良久自川芎防風之類凡舉數種皆非但一味白芷耳王益神之此藥初無名王曰是藥處自都梁人可名都梁丸也大治諸風眩暈婦人産前後乍傷風邪頭目昏重及血風頭痛服之令人目明凡沐浴後服一二粒甚佳方用香白芷大塊擇白色新潔者先以棕刷刷去塵土用沸湯泡洗四五遍為細末煉蜜丸如彈子大每服一丸多用荊芥點茶蠟細嚼下食後常服諸無所忌只干嚼咽亦可黃芩味苦平大寒無毒療痰熱胃中熱前胡味苦微寒無毒主風氣頭痛推陳致新明目藁本味苦辛溫微寒無毒主除風頭痛天麻味辛平微溫無毒療風無問久近牡丹皮味辛苦溫微寒無毒療頭痛頭風蕭炳云白補赤利蘆薈味苦寒無毒主熱風腦間熱氣明目胡黃連味苦辛平無毒療風唐本補肝膽明目附子味辛甘溫大熱有大毒主風寒張文仲方療眼暴赤腫磣痛不得開又淚出不止削附子黑皮末如蠶糞屎著眥中以定為度孕婦不可服烏頭味辛甘溫大熱有大毒主中風目中痛不可久觀孕婦不可服之半夏味辛平微寒有毒主頭眩悅澤面目消胸膈痰熱墮胎大黃味苦寒大寒無毒主推陳致新和五臟除痰實腸間結熱葶藶味辛苦寒大寒無毒治面目浮腫中風桔梗味辛苦微溫有小毒補血氣除寒熱風痹日華子云補虛養血旋覆花味鹹甘溫微冷利有小毒主目中眵䁾牛膝聖惠方治眼卒生珠管牛膝並葉搗絞取汁日三四度點之白蒿深師方取白艾蒿十束如升大煮取汁以曲及米一如釀酒法候熟稍稍飲之但是面目有瘡皆可飲之斗門方治火眼用艾燒令煙起以碗蓋之候煙上碗成煤取下用溫水調化洗火眼即瘥更入黃連甚妙菥蓂子崔元亮療眼熱痛淚不止以菥蓂子一物搗篩為末欲臥時以銅箸點眼中當有熱淚及有惡物出並去胬肉可三四十夜點之甚妙仙靈脾經驗方治瘡毒入眼以靈脾威靈仙等分為末食後米湯下二錢匕小兒半錢夏枯草簡要濟衆方治脾虛目睛疼冷淚出不止筋脈痛及眼羞明怕日補肝散夏枯草半兩香附子一兩共為末每服一錢臘茶調下無時候服
