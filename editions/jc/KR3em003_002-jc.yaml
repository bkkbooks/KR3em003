body:
  text: 卷之二十五雷頭風內障此眼初患之時頭面多受冷熱毒風衝上頭旋猶如熱病相似俗稱雷頭風或嘔吐或噁心年多衝入眼內致令失明或從一眼先患瞳人或大或小不定後乃相損眼前昏黑不辨三光初覺有患宜服瀉肝湯磁石丸立效詩曰俗號雷頭熱毒風年多衝入眼睛中瞳人微大或微小坐對三光黑不紅腦熱流脂來結白醫師不了便針通雖然翳墜依前暗自愧庸醫不用功瀉肝湯防風茺蔚子各二兩五味子細辛黃芩大黃芒硝各一兩車前子一兩半桔梗一兩上為末以水一盞散一錢煎至五分食後去渣溫服磁石丸磁石燒赤醋焠三遍五味子牡丹皮乾薑黑參各一兩附子炮半兩上為末煉蜜為丸如桐子大食前茶下十丸十六驚振內障此眼初患之時忽因五臟虛勞受疾亦由肝氣不足熱毒衝入腦中或因打築腦中惡血流下漸入眼內後經二三年間變成白翳一如內障形狀不宜針撥先患之眼更一隻牽損之眼卻待翳成依法針之立效然後服鎮肝丸還睛散即瘥詩曰忽然撞振不全傷疼痛微微日子長變即腦脂為白色一如內障睹三光不須錯誤將針撥卻恐為災難可當在後若牽非損者醫元如法如開張鎮肝丸石決明一兩另研細辛乾山藥茺蔚子人參車前子柏子仁茯苓各一兩防風兩半上為末煉蜜為丸如桐子大食後茶下十丸還睛散人參車前子枯梗各一兩茺蔚子芎藭各一兩防風細辛各一兩半上為末以水一盞散一錢煎至五分食前去渣溫服十七綠風內障此眼初患之時頭旋額角偏痛連眼瞼骨及鼻頰骨痛眼內痛澀見花或因嘔吐噁心或因嘔逆後便令一眼先患然後相牽俱損目前花生或紅或黑為肝肺受勞致令然也宜服羚羊角飲子還睛丸兼針諸穴眉骨血脈令住卻疾勢也詩曰初患頭旋偏頭痛額角相牽是綠風眼眶連鼻時時痛悶澀生花黑白紅肝臟誰知先患左肺家右眼作先鋒續後相牽多總患緣他脈帶氣相通風勞入肺肝家壅客熱潛流到腎宮秘澀大腸由自可每覺心煩上築胸必是有時加嘔逆風痰積聚在心中羚羊湯藥須當服還睛丸散立成功頻針眉骨兼諸穴能行病本滅行蹤忌針督脈宜出血恐因此後轉昏蒙瞳子開張三曜絕妙藥能醫更謾逢羚羊角飲子羚羊角防風知母人參茯苓黑參桔梗各二兩細辛三兩黃芩車前子各一兩上為末以水一盞散一錢煎至五分食後去渣溫服還睛丸茺蔚子防風各二兩人參決明子車前子芎藭細辛各一兩上為末煉蜜為丸如桐子大空心茶下十丸十八烏風內障此眼初患之時不疼不癢漸漸昏沉如不患眼人相似先從一眼起復乃相牽俱損瞳子端然不開不大微小不睹三光此是臟氣不和光明倒退眼帶障閉經三五年內昏氣結成翳如青白色不辨人物以後相牽俱損瞳人微小針之無效惟宜服藥補治五臟令奪病勢宜服決明丸補肝湯立效詩曰都無痛癢不頭疼漸漸昏蒙似物瞞沒翳恰如渾不患烏風根本更何言有花臟腑虛勞事無即肝家壅氣嗔兩種既知虛與實分明用藥補和宣覺時先服涼藥飲空腹宜吞磁石丸食後補肝宜早治瞳人未卜即能痊陽衰年老還相似醫者搜尋細意看若絕三光應不救瞳人干定是為難決明丸石決明防風人參車前子細辛茯苓茺蔚子乾山藥桔梗各二兩上為末煉蜜為丸如桐子大食前茶下十丸補肝湯芍藥細辛桔梗車前子人參茯苓各一兩羌活防風各二兩上為末以水一盞散一錢煎至五分食前去渣溫服十九黑風內障此眼初患之時頭旋額角偏痛連眼瞼骨及鼻頰骨時時亦痛兼眼內痛澀有黑花來往先從一眼先患以後相牽俱損亦因腎臟虛勞房室不節因為黑風內障不宜針撥宜服藥將息針治諸穴脈宜服羚羊角飲子補腎丸立效詩曰黑暗形候綠風同臟腑推尋別有蹤黑即腎家來作禍綠風本是肺相攻欲知何藥能為療也要羚羊瘥病宗將息一針除赤眼澀即輕輕兼眼中切忌房勞與嗔怒恣意之流切莫從瞳子開張三曜絕名醫拱手謾相逢羚羊角飲子羚羊角羌活黑參細辛桔梗黃芩柴胡各一兩車前子茺蔚子各一兩半防風一兩上為末煉蜜為丸如桐子大食後茶下十丸補腎丸人參茯苓五味子細辛肉桂桔梗各一兩山藥柏子仁各二兩半乾地黃一兩半上搗羅為末煉蜜為丸如桐子大空心茶下十丸二十青風內障此眼初患之時微有痛澀頭旋腦痛或眼先見有花無花瞳人不開不大漸漸昏暗或因勞倦漸加昏重宜令將息便須服藥恐久結為內障不宜針撥皆因五臟虛勞所作致令然也宜服羚羊角湯還睛散即瘥詩曰曾無癢痛本源形一眼先昏後得名瞳子端然如不患青風便是此源因初時微有頭旋悶或見花生又不生忽因勞倦加昏暗知者還應自失驚服藥更須將息到莫遣風勞更發萌須服羚羊湯與散還睛墜翳自相應頭摩膏藥頻頻上免使雙眸失卻明患者無知違此法他時還道是前生羚羊角湯羚羊角人參黑參地骨皮羌活各一兩車前子一兩半上為末以水一盞散一錢煎至五分食遠服還睛散人參車前子地骨皮茯苓細辛防風芎藭羌活各等分上為末以水一盞散一錢煎至五分食後去渣溫服二十一肝虛雀目內障此眼初患之時愛多癢或澀發歇時時暗也後極重之時惟昏黃不見惟視直下之物宜服洗肝湯瀉肝湯即瘥詩曰雀目雖輕不可欺小兒患者作疳翳大人肝臟虛勞事更被風來助本基花發眼前隨自見不憂後患即無知年深自必亡雙目欲觀三光後世稀洗肝湯大黃車前子黑參黃芩細辛茺蔚子各二兩上搗羅為末以水一盞散五分入黑豆三七粒煎至五分去黑豆空心下一服臨臥一服瀉肝湯黃芩防風各二兩芍藥桔梗芒硝大黃各二兩上搗羅為末以水一盞散半錢煎至五分食前去渣溫服二十二高風雀目內障此眼初患之時肝有積熱沖腎臟虛勞亦兼患後風沖肝氣不足致患此疾與前狀不同見物有別惟見頂上之物然後為青盲宜服補肝散還睛丸即瘥詩曰雀目前篇已辨根此篇何要再三論直緣病狀同中異為是高風要別陳一種黃昏無所見若觀天象總難分多年瞳子如金色欲識高風只是真兩目初醫何藥妙卓肝入口火燃薪風勞更若除根本永保千秋共萬春補肝散人參茯苓車前子川大黃黃芩各一兩五味子防風各二兩黑參二兩半上為末以水一盞散一錢煎至五分去渣溫服還睛丸人參細辛茯苓木香知母芎藭各一兩石決明茺蔚子各二兩上為末煉蜜為丸如桐子大空心茶下十丸二十三肝風目暗內障此眼初患之時眼朦昏暗並無赤痛內無翳膜此是腎臟虛勞肝氣不足眼前多生花數般形狀或黑或白或黃或青如此患者切忌房室如夜看細書亦恐失明也見一物面形難辨後亦變為青盲急宜補治五臟可得疾退宜服補肝散山藥丸立效詩曰朦朧遠視不分明赤痛前無淨黑睛下冷肝虛元氣乏眼前花見數般形暫時辭卻陰陽事書畫裁縫且慢停不是醫家穿鑿說古來聖者說章程有時一物睹為二心緒多饒妄與驚急服車前丸及散免教久後變青盲補肝散羚羊角防風各二兩羌活車前子人參茯苓細辛黑參黃芩各三兩半上為末食後米飲湯調下一錢山藥丸乾山藥乾地黃人參茯苓防風澤瀉各一兩上為末煉蜜為丸如桐子大空心茶下十丸
