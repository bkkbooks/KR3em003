body:
  text: 卷之六六十三眼坐起生花外障此眼初患之時眼中別無所苦惟久坐多時忽然起後頭旋眼中黑花發昏良久乃定皆因肝腎俱勞受風心臟熱毒上衝致有此疾如治療稍遲以後變為青盲宜服鎮心丸補肝散立效詩曰眼中無別患蹲坐便生花初患頭旋悶心肝風觸他腎虛兼受熱房事每頻多鎮心肝要補早服莫蹉跎任信年深後為災可奈何更因諸疾作瞳子染沉疴鎮心丸銀液當取見成銀箔以水銀銷之為泥合硝石銀液及鹽研為粉燒出水銀淘去鹽石研細用之芎藭藁本人參細辛各一兩石決明遠志黑參各半兩上為末煉蜜為丸如桐子大空心茶下十丸補肝散茺蔚子一兩半羌活知母旋覆花各一兩甘菊花三分防風上為末以水一盞散一錢煎至五分食後去渣溫服六十四瞳人幹缺外障此眼初患之時忽因疼痛發歇作時難忍夜臥不得睡即瞳人幹缺或上或下或東或西常不圓正不辨三光久後俱損大人多患其瞳人或白黑不定白者腦脂流下為患黑者膽熱腎臟俱勞肝風為患宜服瀉肝湯鎮肝丸立效詩曰瞳人幹缺水金無或黑或白作形模白即腦脂來閉塞黑即其中本自虛此狀必須疼痛後膽家風熱作勞劬名醫拱手無方救堪嘆長年暗室居瀉肝湯麥門冬黑參黃芩知母地骨皮各一兩赤芍藥茺蔚子各一兩半上為細末以水一盞散一錢煎至五分食後去渣溫服鎮肝丸車前子人參茯苓石決明五味子細辛各一兩半乾山藥二兩上為末每日空心米湯調下一錢六十五眼黃膜上衝外障此眼初患之時疼痛發歇作時赤澀淚出漸生黃膜直覆黑睛難辨人物皆因腎臟風冷胃家極熱切宜鐮鉤尉烙然後宜點曾青膏服通脾瀉胃湯立效詩曰黑睛從下生黃膜脾胃含風熱與並疼痛發時多計較門冬犀角便能徵或鐮或點依輕法若用邪巫不用爭若用燒炙無效後再來求療為施行曾青膏曾青秦皮細辛白芷乳頭香龍腦各一分黃連五分訶子木香各一兩上為末研令勻細以水二碗浸三日後煎至一盞以束綿濾渣後更入蜜四兩同煎為膏盛瓷瓶中封之勿令泄氣用之點眼立效通脾瀉胃湯麥門冬茺蔚子各一兩防風大黃黑參知母各一兩天門冬黃芩各一兩五錢上為末研令勻細以水一盞散一錢煎至五分食後去渣溫服六十六眼赤膜下垂外障此眼初患之時忽然赤澀淚下痛癢摩隱瞳人黑睛漸生翳障赤膜下垂直覆眼睛有此障閉如雲霞之色最宜鐮洗出血尉烙前後點清涼煎服羚羊角飲子即瘥詩曰黑睛從上直來遮臟腑原知受客邪熱氣上攻肝內壅睛輪被覆似雲霞上瞼還令瘀血盡飲子宣除效不差消停又點清涼藥諸藥臨時任減加清涼煎龍腦膩粉馬牙硝秦皮各一兩防風黃連各三分上為末研極細以水二碗浸藥二日後煎取二大盞濾去渣更煎三五沸以束用瓷盒子盛之別入龍腦攪勻密封勿令塵入用之點眼立效羚羊角飲子羚羊角一兩五錢黃耆二兩茺蔚子二兩黃芩天門冬黑參知母桔梗各一兩上為末以水一盞散一錢煎至五分食後去渣溫服六十七眼小眥赤脈外障此眼初患之時還從上眥漸生赤脈奔來睛上皆因三焦聚熱沖肝膈壅熱使然治療稍遲以後恐損眼目宜服犀角飲子後點摩翳膏即瘥詩曰赤脈根深小眥中自然漸漸覺奔沖三焦聚熱為災患欲療先令飲子通浮大必須鉤割烙頻頻用藥即消融酸鹹熱物房中事謹戒如師受戒同犀角飲子犀角羚羊角大黃人參茯苓知母黃芩各一兩桔梗防風各二兩上為末以水一盞散一錢煎至五分食後去渣溫服摩翳膏石決明水晶硃砂龍腦珍珠末各一分琥珀二分上為末研如粉面後入酥為膏每至夜後點服立效六十八小兒通晴外障此眼初患之時皆因失誤築打著頭面額角倒蹙撲下令小兒肝受驚風遂使眼目通睛宜服牛黃丸犀角飲子通頂石南散立效詩曰小兒兩目患通睛欲擬看西又看東振著腦中睛帶轉肝家受得內驚風牛黃犀角頻研服細研石南吹鼻中乳母牽連須忌口數朝方得舊時容牛黃丸牛黃白附子肉桂乾蠍芎藭石膏各一分白芒二分藿香五錢硃砂麝香各少許上為末煉蜜為丸如桐子大臨臥薄荷湯下三丸乳母忌濕熱面豬肉等物小兒化服亦得犀角飲子犀角一兩射干草龍膽各五錢鉤藤黃芩各五分人參二兩茯苓甘草各一分遠志二分上為末以水一盞散一錢煎至五分食後去渣溫服通頂石南散石南一兩藜蘆黃三分瓜蒂五七個上為末每用一粳米許一日兩度通頂為妙六十九小兒斑瘡入眼外障此眼初患之時不論大小須患斑瘡一度瘡子患時覺入眼中即時將息慎忌若不忌口將息即便疼痛淚出赤澀怕日難開腫硬翳如銀色此乃熱氣在肝上衝入眼肝膈壅毒因成障翳宜用秦皮湯洗之後服涼肝丸不宜鐮洗出血點藥挑撥恐損眼得疼痛定即點退翳藥詩曰夫為人子一生身須患斑瘡不可論熱氣透肝衝上瞼難開腫硬更羞明眼疼翳出如白銀不要強將兩手親卻恐叫啼傷破後順時保護要殷勤秦皮煎水頻頻洗服藥應教微有旬病者若能依此訣遺君終老眼分明秦皮湯秦皮二兩秦艽細辛防風各一兩甘草五錢上為末以水一盞散一錢煎至三五沸熱淋洗眼立效涼肝丸防風二兩黃芩茺蔚子黑參大黃知母各一兩人參茯苓各一兩五錢上為末煉蜜為丸如桐子大空心茶下十丸七十小兒瞼中生贅外障此眼初患之時皆脾胃壅熱上衝入眼瞼眥之中致令生肉初時小如麻米後三五年間長大摩隱瞳人赤澀淚出切宜鉤割散去瘀血後乃尉烙宜服搜胃散補肝丸點曾青膏立效詩曰小兒眼瞼贅雖稀醫者先來也要知初即小如麻子大日深漸長豆珠垂必須割烙流瘀血斟量湯丸宜三思若逢高貴嬌兒女點藥還須得妙奇搜胃散大黃桔梗黑參防風車前子細辛芒硝黃芩各等分上為末以水一盞散一錢煎至五分食後去渣溫服補肝丸芎藭藁本細辛五味子各一兩茺蔚子二兩羌活知母各一兩五錢上為末煉蜜為丸如桐子大空心茶下十丸曾青膏曾青一兩龍腦少許硃砂乳頭香琥珀珍珠各一分上為末研如面相似調酥為膏每至夜後點眼七十一小兒疳眼外障此眼初患之時皆因腦熱頭上有瘡或因雀目多時瀉痢潛沖疼痛淚出難開膈間熱肝風入初患之時時時癢澀撏眉咬甲揉鼻致令翳生赤腫疼痛淚出難開膈硬白膜遮滿怕日合面而臥不喜抬頭此疾不宜燒炙頭面恐損眼目尤忌點藥宜服殺疳散退翳丸立效詩曰小兒疳眼自何來腦熱肝風起禍災或固瀉痢潛中上雀目多時亦是媒初患時時閉癢澀病深生翳腫難開手撏頭髮兼揉鼻怕見光明頭不抬計拙便將頭面炙枉遭疼痛實堪哀庸醫不解輕輕點刺著瘡痕疼不諧欲知痊瘥求何道服藥如風捲霧開殺疳散防風龍腦牡蠣各二兩五味子白芷細辛各一兩上為細末每日空心米湯調下一錢退翳丸黑參防風人參茯苓石決明細辛黃芩桔梗車前子各一兩上為末煉蜜為丸如桐子大空心茶下十丸七十二小兒青盲外障此眼初患之時在母腹中忽受驚邪之氣今生後五七歲以來便多患眼其初患夜臥多驚嘔吐痰涎黃汁漸漸失明還從一眼先患後乃相牽俱損初覺便宜將息急療服牛膽丸犀角飲子立效詩曰胎中受得風邪氣五臟相遭各有名天吊只因心領得目盲肝納是前程痰涎嘔吐皆黃汁神彩時時只欲驚兩眼若能求見物服藥良醫始見明牛膽丸牛膽鉤藤各五錢人參羚羊角藿香廣香各一兩琥珀少許上為末煉蜜為丸如桐子大空心薄荷湯下三丸七歲以上五丸犀角飲子犀角防風芍藥黃芩各一兩羚羊角知母各二兩人參五兩上為末以水一盞散一錢煎至五分食後去渣溫服
